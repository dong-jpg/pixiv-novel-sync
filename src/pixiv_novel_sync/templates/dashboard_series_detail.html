<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>系列详情 - Pixiv 小说同步器</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-soft: #f4f6fb;
      --text: #1f2330;
      --text-secondary: #6f7685;
      --line: #e5e8ef;
      --brand: #0096fa;
      --brand-soft: rgba(0, 150, 250, 0.10);
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 16px 36px rgba(31, 35, 48, 0.08);
      --radius: 14px;
      --radius-lg: 22px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    .topbar { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,0.86); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); }
    .topbar-inner { max-width: 1160px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; min-height: 58px; gap: 16px; }
    .brand { font-size: 17px; font-weight: 800; color: var(--brand); }
    .nav { display: flex; gap: 2px; overflow-x: auto; white-space: nowrap; }
    .nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 9px 12px; border-radius: 999px; }
    .nav a:hover, .nav a.active { color: var(--brand); background: var(--brand-soft); }
    .page { max-width: 1160px; margin: 0 auto; padding: 24px 24px 64px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 700; margin: 0 0 14px; }
    .back-link:hover { color: var(--brand); }
    .hero { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid rgba(229,232,239,0.8); padding: 26px; display: grid; grid-template-columns: 210px minmax(0, 1fr); gap: 28px; align-items: start; }
    .cover-wrap { position: sticky; top: 82px; }
    .cover, .empty-cover { width: 210px; aspect-ratio: 3 / 4.15; border-radius: 18px; object-fit: cover; background: linear-gradient(135deg, #dbeafe, #eef2ff); box-shadow: 0 18px 36px rgba(31,35,48,.16); }
    .empty-cover { display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: 18px; font-weight: 800; text-align: center; padding: 18px; }
    .info { min-width: 0; padding-top: 4px; }
    .title { font-size: clamp(26px, 4vw, 38px); line-height: 1.22; letter-spacing: -0.035em; margin: 0 0 14px; }
    .meta { color: var(--text-secondary); font-size: 14px; line-height: 1.85; }
    .meta strong { color: var(--text); }
    .hero-tools { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 0; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 6px 10px; border-radius: 999px; background: var(--brand-soft); color: var(--brand); font-size: 12px; font-weight: 800; }
    .caption { margin-top: 14px; color: var(--text-secondary); font-size: 14px; line-height: 1.8; max-width: 780px; white-space: pre-wrap; }
    .card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid rgba(229,232,239,0.8); margin-top: 18px; overflow: hidden; }
    .card-head { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 24px; border-bottom: 1px solid var(--line); }
    .card-title { margin: 0; font-size: 17px; font-weight: 900; }
    .card-sub { color: var(--text-secondary); font-size: 13px; font-weight: 700; }
    .chapter-list { display: grid; gap: 0; padding: 6px 0; }
    .chapter-item { display: grid; grid-template-columns: 44px minmax(0, 1fr) auto; gap: 12px; align-items: center; min-height: 54px; border-bottom: 1px solid var(--line); padding: 8px 18px; transition: background .18s; text-decoration: none; color: var(--text); }
    .chapter-item:hover { background: var(--surface-soft); }
    .chapter-item.is-reading { background: rgba(0,150,250,.06); }
    .chapter-num { color: var(--text-secondary); font-weight: 900; font-size: 13px; text-align: right; font-variant-numeric: tabular-nums; }
    .chapter-info { min-width: 0; }
    .chapter-title { font-size: 14px; font-weight: 800; line-height: 1.35; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chapter-meta { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.4; }
    .chapter-progress { color: var(--brand); background: var(--brand-soft); border-radius: 999px; padding: 4px 8px; font-size: 11px; font-weight: 900; white-space: nowrap; }
    .loading, .empty { text-align: center; padding: 54px 18px; color: var(--text-secondary); }
    .btn { border: none; border-radius: 999px; padding: 9px 15px; font-size: 13px; font-weight: 800; cursor: pointer; transition: transform .18s, background .18s; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-danger { background: rgba(239,68,68,.10); color: var(--danger); }
    .actions { display: flex; gap: 8px; }
    @media (max-width: 840px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; padding: 12px 16px; }
      .page { padding: 16px 14px 44px; }
      .hero { grid-template-columns: 1fr; padding: 18px; }
      .cover-wrap { position: static; display: flex; justify-content: center; }
      .cover, .empty-cover { width: min(62vw, 240px); }
      .card-head { align-items: flex-start; flex-direction: column; padding: 16px; }
      .chapter-list { padding: 4px 0; }
      .chapter-item { grid-template-columns: 34px minmax(0, 1fr); gap: 10px; min-height: 50px; padding: 8px 12px; }
      .chapter-progress { grid-column: 2; justify-self: start; margin-top: -2px; }
      .actions { width: 100%; }
      .actions .btn { flex: 1; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Pixiv 小说同步器</div>
      <nav class="nav">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/follows">关注</a>
        <a class="active" href="/dashboard/novels">小说</a>
        <a href="/dashboard/logs">日志</a>
        <a href="/dashboard/settings">设置</a>
        <a href="/token-login">登录</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <a class="back-link" href="/dashboard/novels?category=following">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      返回追更列表
    </a>

    <section id="hero" class="hero">
      <div class="cover-wrap"><div class="empty-cover">加载中...</div></div>
      <div class="info">
        <h1 class="title">加载中...</h1>
        <div class="meta">请稍候</div>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <h2 class="card-title">章节列表</h2>
          <div id="chapterCount" class="card-sub"></div>
        </div>
        <div class="actions">
          <button id="continueBtn" class="btn btn-primary" style="display:none;" onclick="continueReading()">继续阅读</button>
          <button id="deleteBtn" class="btn btn-danger" onclick="deleteSeries()">删除系列</button>
        </div>
      </div>
      <div id="chapters" class="loading">正在加载章节...</div>
    </section>
  </main>

  <script>
    const pathParts = window.location.pathname.split('/');
    const seriesId = Number(pathParts[pathParts.length - 1] || 0);
    const progressPrefix = 'pixivNovelSync:reading:';

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, function (ch) {
        if (ch === '&') return '&amp;';
        if (ch === '<') return '&lt;';
        if (ch === '>') return '&gt;';
        if (ch === '"') return '&quot;';
        return ch;
      });
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function formatTextLength(chars) {
      const value = Number(chars || 0);
      if (!value) return '0 字';
      if (value >= 10000) return (value / 10000).toFixed(1) + ' 万字';
      return formatNumber(value) + ' 字';
    }

    function readChapterProgress(novelId) {
      try {
        return JSON.parse(localStorage.getItem(progressPrefix + novelId) || 'null');
      } catch (err) {
        return null;
      }
    }

    let continueNovelId = null;

    function continueReading() {
      if (continueNovelId) {
        window.location.href = `/dashboard/novels/${encodeURIComponent(continueNovelId)}`;
      }
    }

    async function loadDetail() {
      const resp = await fetch(`/api/dashboard/series/${encodeURIComponent(seriesId)}`);
      const data = await resp.json();
      if (!resp.ok) {
        document.getElementById('hero').innerHTML = '<div class="info"><h1 class="title">加载失败</h1><div class="meta">未找到该系列</div></div>';
        document.getElementById('chapters').innerHTML = '<div class="empty">' + escapeHtml(data.error || '未找到系列') + '</div>';
        return;
      }
      const cover = data.cover_url
        ? `<img class="cover" src="/proxy/image?url=${encodeURIComponent(data.cover_url)}" alt="cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
        : '';
      const fallbackCover = `<div class="empty-cover" style="display:${data.cover_url ? 'none' : 'flex'};">${escapeHtml((data.title || '').slice(0, 6))}</div>`;
      const seriesStatusMap = {normal: {label: '正常', color: 'var(--success)'}, deleted: {label: '已删除', color: 'var(--danger)'}, unknown: {label: '未检查', color: 'var(--text-secondary)'}};
      const ss = seriesStatusMap[data.status] || seriesStatusMap.unknown;
      const author = data.author_name || '未知';
      const authorLine = data.user_id ? `<a href="/dashboard/users/${encodeURIComponent(data.user_id)}">${escapeHtml(author)}</a>` : escapeHtml(author);
      document.getElementById('hero').innerHTML = `
        <div class="cover-wrap">${cover}${fallbackCover}</div>
        <div class="info">
          <h1 class="title">${escapeHtml(data.title || '未命名系列')}</h1>
          <div class="hero-tools">
            <span class="badge">${escapeHtml(data.total_novels || 0)} 章</span>
            <span class="badge">${formatTextLength(data.total_text_length)}</span>
            <span class="badge" style="background:${ss.color}20;color:${ss.color};">● ${ss.label}</span>
            ${data.last_checked_at ? `<span class="badge">最后检查 ${escapeHtml(data.last_checked_at)}</span>` : ''}
          </div>
          <div class="meta"><strong>作者：</strong>${authorLine}</div>
          ${data.description ? `<div class="caption">${escapeHtml(data.description)}</div>` : ''}
        </div>
      `;
      const novels = data.novels || [];
      document.getElementById('chapterCount').textContent = `共 ${formatNumber(novels.length)} 章`;
      const chapters = document.getElementById('chapters');
      let bestProgress = null;
      if (!novels.length) {
        chapters.innerHTML = '<div class="empty">暂无章节</div>';
        return;
      }
      const chapterStatusMap = {normal: {label: '正常', color: 'var(--success)'}, deleted: {label: '已删除', color: 'var(--danger)'}, restricted: {label: '受限', color: 'var(--warning)'}, unknown: {label: '', color: 'transparent'}};
      chapters.innerHTML = '<div class="chapter-list">' + novels.map(function (novel, index) {
        const cs = chapterStatusMap[novel.status] || chapterStatusMap.unknown;
        const saved = readChapterProgress(novel.novel_id);
        const percent = saved && typeof saved.progress === 'number' ? Math.round(saved.progress * 100) : 0;
        if (saved && (!bestProgress || (saved.updatedAt || 0) > (bestProgress.updatedAt || 0))) {
          bestProgress = saved;
          continueNovelId = novel.novel_id;
        }
        const statusTag = cs.label ? `<span style="font-size:11px;padding:2px 6px;border-radius:999px;background:${cs.color}20;color:${cs.color};margin-left:6px;">${cs.label}</span>` : '';
        const progressTag = percent > 0 ? `<span class="chapter-progress">${percent}%</span>` : '';
        const itemClass = saved && percent > 0 && percent < 100 ? 'chapter-item is-reading' : 'chapter-item';
        return `
          <a class="${itemClass}" href="/dashboard/novels/${encodeURIComponent(novel.novel_id)}">
            <div class="chapter-num">${index + 1}</div>
            <div class="chapter-info">
              <div class="chapter-title">${escapeHtml(novel.title || '未命名章节')}${statusTag}</div>
              <div class="chapter-meta">${formatNumber(novel.total_bookmarks)} 收藏 · ${formatNumber(novel.total_views)} 浏览${saved && percent > 0 ? ` · 上次阅读 ${percent}%` : ''}</div>
            </div>
            ${progressTag}
          </a>
        `;
      }).join('') + '</div>';
      if (continueNovelId) {
        document.getElementById('continueBtn').style.display = 'inline-flex';
      }
    }

    loadDetail().catch(function () {
      document.getElementById('chapters').innerHTML = '<div class="empty">加载失败</div>';
    });

    async function deleteSeries() {
      if (!confirm('确定要删除这个系列吗？系列下的小说不会被删除，只会解除关联。此操作不可撤销。')) return;
      try {
        const resp = await fetch(`/api/dashboard/series/${encodeURIComponent(seriesId)}`, { method: 'DELETE' });
        const data = await resp.json();
        if (resp.ok) {
          alert('系列已删除');
          window.location.href = '/dashboard/novels?category=following';
        } else {
          alert('删除失败: ' + (data.error || '未知错误'));
        }
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }
  </script>
</body>
</html>
