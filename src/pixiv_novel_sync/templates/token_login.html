<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixiv Token 登录</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; margin: 0; background: #f5f5f7; color: #1d1d1f; }
    .wrap { max-width: 560px; margin: 80px auto; padding: 24px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 32px; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    .desc { color: #86868b; margin: 0 0 24px; font-size: 14px; line-height: 1.6; }
    .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-bottom: 12px; }
    .btn-primary { background: linear-gradient(135deg, #007aff, #5856d6); color: #fff; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #f5f5f7; color: #1d1d1f; border: 1px solid #d2d2d7; }
    .btn-secondary:hover { background: #ebebed; }
    .btn-green { background: #16a34a; color: #fff; }
    .btn-green:hover { opacity: 0.9; }
    .btn-green:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="text"] { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 14px; font-family: monospace; box-sizing: border-box; }
    input[type="text"]:focus { outline: none; border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,0.15); }
    .status { margin-top: 16px; padding: 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; display: none; }
    .status.show { display: block; }
    .status.pending { background: #f0f9ff; color: #007aff; }
    .status.success { background: #f0fdf4; color: #16a34a; }
    .status.error { background: #fef2f2; color: #dc2626; }
    .status.waiting { background: #fffbeb; color: #d97706; }
    .result { margin-top: 16px; background: #f5f5f7; border-radius: 12px; padding: 16px; display: none; }
    .result.show { display: block; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #e5e5ea; }
    .result-row:last-child { border-bottom: none; }
    .result-label { color: #86868b; font-size: 13px; }
    .result-value { font-weight: 600; font-size: 14px; word-break: break-all; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #d2d2d7; border-top-color: #007aff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .divider { text-align: center; color: #86868b; font-size: 13px; margin: 20px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 35%; height: 1px; background: #d2d2d7; }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .steps { margin: 20px 0; }
    .step { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; font-size: 14px; color: #86868b; }
    .step.active { color: #007aff; font-weight: 600; }
    .step.done { color: #16a34a; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .step-num.pending { background: #e5e5ea; color: #86868b; }
    .step-num.active { background: #007aff; color: #fff; }
    .step-num.done { background: #16a34a; color: #fff; }
    .step-text { padding-top: 3px; }
    .step-text small { display: block; font-weight: 400; font-size: 12px; color: #86868b; margin-top: 2px; }
    .hint { font-size: 12px; color: #86868b; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Pixiv 登录</h1>

      <div class="steps">
        <div class="step active" id="step1">
          <div class="step-num active" id="step1Num">1</div>
          <div class="step-text">点击下方按钮，在新标签页打开 Pixiv 登录</div>
        </div>
        <div class="step" id="step2">
          <div class="step-num pending" id="step2Num">2</div>
          <div class="step-text">登录成功后，复制浏览器地址栏的完整 URL<small>地址格式：https://app-api.pixiv.net/.../callback?code=...&state=...</small></div>
        </div>
        <div class="step" id="step3">
          <div class="step-num pending" id="step3Num">3</div>
          <div class="step-text">粘贴到下方输入框，自动完成</div>
        </div>
      </div>

      <button id="loginBtn" class="btn btn-primary">打开 Pixiv 登录页</button>

      <div id="callbackSection" style="display:none;">
        <div class="divider">粘贴回调地址</div>
        <input type="text" id="callbackUrl" placeholder="粘贴 Pixiv 回调地址（https://app-api.pixiv.net/.../callback?code=...&state=...）">
        <div class="hint">登录成功后浏览器地址栏的完整 URL，包含 code 和 state 参数</div>
        <button id="exchangeBtn" class="btn btn-green" style="margin-top:12px;">确认并获取 Token</button>
      </div>

      <div id="statusBox" class="status"></div>

      <div id="resultBox" class="result">
        <div class="result-row">
          <span class="result-label">状态</span>
          <span class="result-value" id="resultStatus">-</span>
        </div>
        <div class="result-row">
          <span class="result-label">User ID</span>
          <span class="result-value" id="resultUserId">-</span>
        </div>
        <div class="result-row">
          <span class="result-label">Refresh Token</span>
          <span class="result-value" id="resultToken" style="font-family:monospace;font-size:12px;">-</span>
        </div>
        <div class="result-row">
          <span class="result-label">写入 .env</span>
          <span class="result-value" id="resultSaved">-</span>
        </div>
      </div>

      <div class="divider">备用方式</div>
      <button id="fallbackBtn" class="btn btn-secondary">使用 gppt 旧版方式</button>
      <div id="fallbackStatus" class="status"></div>
      <pre id="fallbackOutput" style="display:none;background:#f5f5f7;padding:12px;border-radius:8px;font-size:12px;max-height:200px;overflow:auto;margin-top:12px;"></pre>
    </div>
  </div>

  <script>
    let oauthTaskId = null;
    const $ = (id) => document.getElementById(id);

    function showStatus(type, html) {
      const box = $('statusBox');
      box.className = 'status show ' + type;
      box.innerHTML = html;
    }

    function setStep(n, state) {
      $(`step${n}Num`).className = 'step-num ' + state;
      if (state === 'done') $(`step${n}Num`).textContent = '✓';
      $(`step${n}`).className = 'step ' + state;
    }

    // Step 1: 打开 Pixiv 登录页
    $('loginBtn').addEventListener('click', async () => {
      $('loginBtn').disabled = true;
      showStatus('pending', '<span class="spinner"></span>正在创建登录任务...');

      try {
        const resp = await fetch('/oauth/start', { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok || !data.login_url) {
          showStatus('error', '创建任务失败：' + (data.error || '未知错误'));
          $('loginBtn').disabled = false;
          return;
        }

        oauthTaskId = data.task_id;
        setStep(1, 'done');
        setStep(2, 'active');
        showStatus('waiting', '请在新标签页中完成登录，然后复制地址栏的 URL 粘贴到下方');

        // 新标签页打开
        window.open(data.login_url, '_blank');
        $('callbackSection').style.display = 'block';

      } catch (e) {
        showStatus('error', '请求失败：' + e.message);
        $('loginBtn').disabled = false;
      }
    });

    // Step 3: 粘贴回调 URL 并交换
    $('exchangeBtn').addEventListener('click', async () => {
      const url = $('callbackUrl').value.trim();
      if (!url) {
        showStatus('error', '请先粘贴回调地址');
        return;
      }
      if (!url.includes('code=') || !url.includes('state=')) {
        showStatus('error', 'URL 格式不对，应该包含 code= 和 state= 参数');
        return;
      }
      if (!oauthTaskId) {
        showStatus('error', '请先点击"打开 Pixiv 登录页"');
        return;
      }

      setStep(2, 'done');
      setStep(3, 'active');
      $('exchangeBtn').disabled = true;
      showStatus('pending', '<span class="spinner"></span>正在交换 token...');

      try {
        // 同步 state
        await fetch(`/oauth/sync-callback/${oauthTaskId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ callback_url: url })
        });

        // 兑换 token
        const resp = await fetch(`/oauth/exchange/${oauthTaskId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ callback_url: url })
        });
        const data = await resp.json();

        if (resp.ok && data.refresh_token) {
          setStep(3, 'done');
          $('resultBox').classList.add('show');
          $('resultStatus').textContent = '授权成功';
          $('resultStatus').style.color = '#16a34a';
          $('resultUserId').textContent = data.user_id || '-';
          $('resultToken').textContent = data.refresh_token;
          showStatus('success', 'Token 获取成功！正在自动写入 .env...');

          // 自动保存
          const saveResp = await fetch(`/oauth/save/${oauthTaskId}`, { method: 'POST' });
          const saveData = await saveResp.json();
          if (saveResp.ok) {
            $('resultSaved').textContent = '已保存';
            $('resultSaved').style.color = '#16a34a';
            showStatus('success', '全部完成！token 已写入 .env，可以关闭此页面。');
          } else {
            $('resultSaved').textContent = '保存失败：' + (saveData.error || '');
            $('resultSaved').style.color = '#dc2626';
            showStatus('error', 'Token 获取成功但写入 .env 失败');
          }
        } else {
          showStatus('error', '兑换失败：' + (data.error || data.message || '未知错误'));
          setStep(3, 'pending');
        }
      } catch (e) {
        showStatus('error', '请求失败：' + e.message);
        setStep(3, 'pending');
      }

      $('exchangeBtn').disabled = false;
    });

    // 回车键触发
    $('callbackUrl').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('exchangeBtn').click();
    });

    // ========== gppt fallback ==========
    $('fallbackBtn').addEventListener('click', async () => {
      $('fallbackOutput').style.display = 'none';
      const box = $('fallbackStatus');
      box.className = 'status show pending';
      box.innerHTML = '<span class="spinner"></span>正在启动 gppt...';

      try {
        const resp = await fetch('/api/token-jobs', { method: 'POST' });
        const data = await resp.json();
        const jobId = data.job_id;
        box.className = 'status show waiting';
        box.innerHTML = '<span class="spinner"></span>' + (data.message || '运行中...');
        $('fallbackOutput').textContent = '';
        $('fallbackOutput').style.display = 'block';

        const timer = setInterval(async () => {
          try {
            const r = await fetch(`/api/token-jobs/${jobId}`);
            const d = await r.json();
            $('fallbackOutput').textContent = (d.output || []).join('\n');
            $('fallbackOutput').scrollTop = $('fallbackOutput').scrollHeight;

            if (d.status === 'done') {
              clearInterval(timer);
              if (d.refresh_token) {
                box.className = 'status show success';
                box.innerHTML = '获取成功！正在自动保存...';
                const saveResp = await fetch('/api/save-token', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ refresh_token: d.refresh_token, user_id: d.user_id || '' })
                });
                box.innerHTML = saveResp.ok
                  ? 'token 已自动写入 .env，可以关闭此页面。'
                  : 'token 获取成功但写入失败，请手动保存';
              } else {
                box.className = 'status show error';
                box.innerHTML = '未获取到 token';
              }
            } else if (d.status === 'failed') {
              clearInterval(timer);
              box.className = 'status show error';
              box.innerHTML = '失败：' + (d.message || '未知错误');
            }
          } catch (e) { /* 继续 */ }
        }, 2000);
      } catch (e) {
        box.className = 'status show error';
        box.innerHTML = '启动失败：' + e.message;
      }
    });
  </script>
</body>
</html>
