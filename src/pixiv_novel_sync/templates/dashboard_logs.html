{% extends "base.html" %}

{% block title %}任务日志 - Pixiv 小说同步器{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-6">

  <!-- Header -->
  <div>
    <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight mb-2">任务日志</h1>
    <p class="text-sm sm:text-base text-slate-500">查看手工任务和定时任务的执行记录，日志默认保留 3 天</p>
  </div>

  <!-- Filter Bar -->
  <div class="bg-white/35 backdrop-blur-xl backdrop-saturate-[1.8] border border-white/50 shadow-glass rounded-2xl p-4 sm:p-5 flex flex-col md:flex-row md:items-center gap-4">
    <div class="flex flex-wrap items-center gap-4 flex-1">
      <!-- Type Filter -->
      <div class="flex items-center gap-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">任务类型</label>
        <select id="filterType" class="px-3 py-1.5 bg-white/50 border border-white/60 text-slate-800 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-colors appearance-none min-w-[120px]">
          <option value="">全部</option>
          <option value="bookmarks">收藏同步</option>
          <option value="following_list">关注列表</option>
          <option value="following_novels">关注小说</option>
          <option value="subscribed_series">追更系列</option>
          <option value="user_status">检查用户状态</option>
          <option value="novel_status">检查小说状态</option>
          <option value="series_status">检查系列状态</option>
          <option value="pending_deletion_detection">检测取消收藏/追更</option>
        </select>
      </div>

      <!-- Source Filter -->
      <div class="flex items-center gap-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">来源</label>
        <select id="filterSource" class="px-3 py-1.5 bg-white/50 border border-white/60 text-slate-800 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-colors appearance-none min-w-[100px]">
          <option value="">全部</option>
          <option value="manual">手工任务</option>
          <option value="auto">定时任务</option>
        </select>
      </div>

      <!-- Days Filter -->
      <div class="flex items-center gap-2">
        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">保留天数</label>
        <select id="filterDays" class="px-3 py-1.5 bg-white/50 border border-white/60 text-slate-800 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-colors appearance-none min-w-[80px]">
          <option value="1">1 天</option>
          <option value="3" selected>3 天</option>
          <option value="7">7 天</option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <label class="flex items-center gap-2 text-sm text-slate-600 cursor-pointer">
        <input type="checkbox" id="autoRefreshToggle" class="w-4 h-4 text-brand-600 bg-white/50 border-white/60 rounded focus:ring-blue-500/50 focus:ring-2 cursor-pointer">
        自动刷新 (10s)
      </label>
      <button id="applyFilter" class="px-4 py-1.5 bg-blue-500 text-white hover:bg-blue-600 text-sm font-semibold rounded-xl transition-colors shadow-glass-sm">应用筛选</button>
      <button id="refreshLogs" class="px-4 py-1.5 bg-white/40 backdrop-blur-md border border-white/60 hover:bg-white/55 text-slate-700 text-sm font-semibold rounded-xl transition-colors shadow-glass-sm">刷新</button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="bg-white/35 backdrop-blur-xl backdrop-saturate-[1.8] border border-white/50 shadow-glass rounded-2xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-left whitespace-nowrap">
        <thead class="bg-white/20 border-b border-white/30">
          <tr>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">任务类型</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">任务名称</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">来源</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">状态</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">开始时间</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">持续时间</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider">结果</th>
            <th scope="col" class="px-6 py-3 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">操作</th>
          </tr>
        </thead>
        <tbody id="logsTableBody" class="divide-y divide-white/20">
          <tr>
            <td colspan="8" class="px-6 py-12 text-center text-slate-500">
              <svg class="animate-spin h-6 w-6 mx-auto mb-2 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              加载中...
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="hidden px-6 py-4 bg-white/20 border-t border-white/30 flex items-center justify-between">
      <div class="pagination-info text-sm text-slate-500 font-medium"></div>
      <div class="flex gap-2">
        <button id="prevPage" class="px-4 py-1.5 text-sm font-semibold bg-white/40 backdrop-blur-md border border-white/60 text-slate-700 rounded-xl hover:bg-white/55 transition-colors shadow-glass-sm disabled:opacity-50 disabled:cursor-not-allowed">上一页</button>
        <button id="nextPage" class="px-4 py-1.5 text-sm font-semibold bg-white/40 backdrop-blur-md border border-white/60 text-slate-700 rounded-xl hover:bg-white/55 transition-colors shadow-glass-sm disabled:opacity-50 disabled:cursor-not-allowed">下一页</button>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div id="detailModal" class="hidden fixed inset-0 z-[100] bg-black/30 backdrop-blur-sm flex items-center justify-center p-4">
  <div class="bg-white/50 backdrop-blur-2xl backdrop-saturate-[1.5] border border-white/40 shadow-glass-lg rounded-3xl w-full max-w-3xl max-h-[90vh] flex flex-col transform transition-all">
    <div class="flex items-center justify-between px-6 py-4 border-b border-white/30">
      <h2 id="modalTitle" class="text-lg font-bold text-slate-800 truncate">任务详情</h2>
      <button id="closeModal" class="text-slate-400 hover:text-slate-600 focus:outline-none transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <div id="modalBody" class="p-6 overflow-y-auto custom-scrollbar flex-1 text-sm text-slate-700">
      <!-- Content injected by JS -->
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<style>
  /* Dropdown arrow custom styling */
  select {
    background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
    background-position: right 0.5rem center;
    background-repeat: no-repeat;
    background-size: 1.5em 1.5em;
  }

  .custom-scrollbar::-webkit-scrollbar { width: 6px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 4px; }
</style>

<script>
  const $ = (sel) => document.querySelector(sel);

  let currentPage = 1;
  let currentFilters = { task_type: '', is_auto: '', days: 3 };

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch] || ch));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatTime(dateStr) {
    if (!dateStr) return '-';
    if (/^\d{2}:\d{2}:\d{2}$/.test(dateStr)) return dateStr;
    const date = new Date(dateStr);
    if (isNaN(date)) return dateStr;
    return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatDuration(seconds) {
    if (seconds === null || seconds === undefined) return '-';
    if (seconds < 60) return `${Math.round(seconds)}秒`;
    if (seconds < 3600) return `${Math.round(seconds / 60)}分钟`;
    return `${(seconds / 3600).toFixed(1)}小时`;
  }

  function getStatusBadge(status) {
    const map = {
      'running': { label: '运行中', class: 'bg-blue-500/10 text-blue-700 border border-blue-300/30 rounded-xl' },
      'completed': { label: '完成', class: 'bg-green-500/10 text-green-700 border border-green-300/30 rounded-xl' },
      'succeeded': { label: '成功', class: 'bg-green-500/10 text-green-700 border border-green-300/30 rounded-xl' },
      'failed': { label: '失败', class: 'bg-red-500/10 text-red-700 border border-red-300/30 rounded-xl' },
      'stopped': { label: '停止', class: 'bg-yellow-500/10 text-yellow-700 border border-yellow-300/30 rounded-xl' }
    };
    const s = map[status] || { label: status, class: 'bg-slate-500/10 text-slate-700 border border-slate-300/30 rounded-xl' };
    return `<span class="inline-flex items-center px-2 py-0.5 text-xs font-bold ${s.class}">${escapeHtml(s.label)}</span>`;
  }

  function getTaskTypeName(type) {
    const map = {
      'bookmark': '收藏同步', 'bookmarks': '收藏同步',
      'following_users': '关注用户', 'following_list': '关注列表', 'following_novels': '关注小说', 'following_series': '关注系列',
      'subscribed_series': '追更系列',
      'user_status': '检查用户状态', 'novel_status': '检查小说状态', 'series_status': '检查系列状态',
      'pending_deletion_detection': '检测取消',
      'manual': '手工任务'
    };
    return map[type] || type;
  }

  async function loadLogs(page = 1) {
    const tbody = $('#logsTableBody');
    tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-12 text-center text-slate-500"><svg class="animate-spin h-6 w-6 mx-auto mb-2 text-slate-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>加载中...</td></tr>';

    try {
      const params = new URLSearchParams({ page: page, page_size: 20, days: currentFilters.days });
      if (currentFilters.task_type) params.append('task_type', currentFilters.task_type);
      if (currentFilters.is_auto) params.append('is_auto', currentFilters.is_auto);

      const resp = await fetch(`/api/dashboard/logs?${params}`);
      const data = await resp.json();

      if (data.items && data.items.length > 0) {
        tbody.innerHTML = data.items.map(log => `
          <tr class="hover:bg-white/30 transition-colors">
            <td class="px-6 py-3 whitespace-nowrap text-sm"><span class="bg-slate-500/10 text-slate-700 border border-slate-300/30 px-2 py-1 rounded-xl">${escapeHtml(getTaskTypeName(log.task_type))}</span></td>
            <td class="px-6 py-3 whitespace-nowrap text-sm text-slate-800 font-medium">${escapeHtml(log.task_name)}</td>
            <td class="px-6 py-3 whitespace-nowrap text-sm font-medium ${log.is_auto_sync ? 'text-purple-600' : 'text-slate-500'}">${log.is_auto_sync ? '定时任务' : '手工任务'}</td>
            <td class="px-6 py-3 whitespace-nowrap">${getStatusBadge(log.status)}</td>
            <td class="px-6 py-3 whitespace-nowrap text-sm text-slate-500">${formatDate(log.started_at)}</td>
            <td class="px-6 py-3 whitespace-nowrap text-sm text-slate-500">${formatDuration(log.duration_seconds)}</td>
            <td class="px-6 py-3 whitespace-nowrap text-sm">${formatResult(log)}</td>
            <td class="px-6 py-3 whitespace-nowrap text-right">
              <button onclick="showLogDetail(${log.id})" class="text-brand-600 hover:text-brand-800 font-medium text-sm transition-colors focus:outline-none">查看详情</button>
            </td>
          </tr>
        `).join('');
        updatePagination(data, page);
      } else {
        tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-16 text-center text-slate-500 font-medium">暂无相关的日志记录</td></tr>';
        $('#pagination').classList.add('hidden');
      }
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-red-500 font-medium">加载失败：${e.message}</td></tr>`;
    }
  }

  function formatResult(log) {
    if (log.status === 'running') return '-';
    if (log.status === 'failed') {
      const errorMsg = escapeHtml(log.error_message || '未知错误');
      return `<span class="text-red-500 text-xs font-medium" title="${errorMsg}">失败: ${errorMsg.substring(0, 20)}${errorMsg.length > 20 ? '...' : ''}</span>`;
    }
    if (log.stats) {
      const s = log.stats;
      const parts = [];
      if (s.novels_synced ?? s.novels) parts.push(`${s.novels_synced ?? s.novels}本`);
      if (s.users_synced ?? s.users) parts.push(`${s.users_synced ?? s.users}人`);
      if (s.series_synced) parts.push(`${s.series_synced}系列`);
      if (s.assets_downloaded) parts.push(`${s.assets_downloaded}图`);
      return parts.length ? `<span class="text-green-700 font-medium text-xs">${parts.join(', ')}</span>` : '<span class="text-slate-400 text-xs">完成</span>';
    }
    return '<span class="text-slate-400 text-xs">完成</span>';
  }

  function updatePagination(data, currentPage) {
    const pagination = $('#pagination');
    pagination.querySelector('.pagination-info').innerHTML = `第 <strong class="text-slate-800">${data.page}</strong> 页，共 <strong class="text-slate-800">${data.total_pages}</strong> 页，总计 <strong class="text-slate-800">${data.total}</strong> 条记录`;
    pagination.classList.remove('hidden');
    pagination.classList.add('flex');
    $('#prevPage').disabled = data.page <= 1;
    $('#nextPage').disabled = data.page >= data.total_pages;
  }

  async function showLogDetail(logId) {
    try {
      const resp = await fetch(`/api/dashboard/logs/${logId}`);
      if (!resp.ok) return alert('日志记录不存在');
      renderLogDetail(await resp.json());
    } catch (e) { alert('加载日志详情失败: ' + e.message); }
  }

  function renderLogDetail(log) {
    $('#modalTitle').textContent = `${getTaskTypeName(log.task_type)} - ${log.task_name}`;
    const b = $('#modalBody');

    const renderStat = (label, value) => value ? `<div class="bg-white/30 backdrop-blur-md p-3 rounded-xl border border-white/40"><div class="text-[11px] text-slate-500 uppercase font-bold tracking-wider mb-1">${label}</div><div class="text-lg font-bold text-slate-800">${value}</div></div>` : '';

    let statsHtml = '';
    if(log.stats) {
      statsHtml = `
        <div class="mb-6">
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 border-b border-white/30 pb-1">同步统计</h3>
          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            ${renderStat('小说', log.stats.novels_synced ?? log.stats.novels)}
            ${renderStat('用户', log.stats.users_synced ?? log.stats.users)}
            ${renderStat('系列', log.stats.series_synced)}
            ${renderStat('图片', log.stats.assets_downloaded)}
            ${renderStat('跳过', log.stats.skipped)}
            ${renderStat('扫描用户', log.stats.following_users_scanned)}
          </div>
        </div>
      `;
    }

    const logsHtml = (log.logs && log.logs.length > 0) ? `
      <div>
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 border-b border-white/30 pb-1">执行日志</h3>
        <div class="bg-slate-900/80 backdrop-blur-xl rounded-xl p-4 font-mono text-xs text-gray-300 max-h-64 overflow-y-auto custom-scrollbar space-y-1">
          ${log.logs.map(e => {
            const isErr = (e.level || '').toLowerCase() === 'error';
            return `<div class="${isErr ? 'text-red-400' : ''}"><span class="text-gray-500 mr-2">[${formatTime(e.time)}]</span>${escapeHtml(e.message)}</div>`;
          }).join('')}
        </div>
      </div>
    ` : '';

    b.innerHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
        <div>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 border-b border-white/30 pb-1">基本信息</h3>
          <div class="space-y-1.5">
            <div class="flex justify-between"><span class="text-slate-500">任务 ID:</span> <span class="font-mono text-slate-800">${log.id}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">来源:</span> <span class="font-medium text-slate-800">${log.is_auto_sync ? '定时任务' : '手工任务'}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">状态:</span> ${getStatusBadge(log.status)}</div>
          </div>
        </div>
        <div>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 border-b border-white/30 pb-1">时间信息</h3>
          <div class="space-y-1.5">
            <div class="flex justify-between"><span class="text-slate-500">开始时间:</span> <span class="text-slate-800">${formatDate(log.started_at)}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">结束时间:</span> <span class="text-slate-800">${formatDate(log.finished_at)}</span></div>
            <div class="flex justify-between"><span class="text-slate-500">持续时间:</span> <span class="text-slate-800">${formatDuration(log.duration_seconds)}</span></div>
          </div>
        </div>
      </div>

      ${log.error_message ? `
        <div class="mb-6">
          <h3 class="text-xs font-bold text-red-500 uppercase tracking-wider mb-2 border-b border-red-300/30 pb-1">错误信息</h3>
          <div class="p-3 bg-red-500/10 text-red-700 rounded-xl border border-red-300/30 font-mono text-sm">${escapeHtml(log.error_message)}</div>
        </div>
      ` : ''}

      ${statsHtml}
      ${logsHtml}
    `;

    $('#detailModal').classList.remove('hidden');
    $('#detailModal').classList.add('flex');
    // slight delay to allow display:flex to apply before opacity transition
    setTimeout(() => {
      $('#detailModal').children[0].classList.add('scale-100', 'opacity-100');
      $('#detailModal').children[0].classList.remove('scale-95', 'opacity-0');
    }, 10);
  }

  function hideModal() {
    $('#detailModal').children[0].classList.remove('scale-100', 'opacity-100');
    $('#detailModal').children[0].classList.add('scale-95', 'opacity-0');
    setTimeout(() => {
      $('#detailModal').classList.add('hidden');
      $('#detailModal').classList.remove('flex');
    }, 200);
  }

  $('#closeModal').addEventListener('click', hideModal);
  $('#detailModal').addEventListener('click', (e) => { if (e.target === $('#detailModal')) hideModal(); });

  $('#prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadLogs(currentPage); } });
  $('#nextPage').addEventListener('click', () => { currentPage++; loadLogs(currentPage); });

  $('#applyFilter').addEventListener('click', () => {
    currentFilters.task_type = $('#filterType').value;
    const sourceVal = $('#filterSource').value;
    currentFilters.is_auto = sourceVal === 'manual' ? 'false' : sourceVal === 'auto' ? 'true' : '';
    currentFilters.days = parseInt($('#filterDays').value);
    currentPage = 1;
    loadLogs(currentPage);
  });

  $('#refreshLogs').addEventListener('click', () => loadLogs(currentPage));

  let autoRefreshTimer = null;
  $('#autoRefreshToggle').addEventListener('change', function () {
    if (this.checked) autoRefreshTimer = setInterval(() => loadLogs(currentPage), 10000);
    else if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  });

  loadLogs(currentPage);
</script>
{% endblock %}
