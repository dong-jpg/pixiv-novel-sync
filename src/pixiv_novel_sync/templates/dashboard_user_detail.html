{% extends "base.html" %}
{% block title %}用户详情 - Pixiv 小说同步器{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-5 pt-2">

  <!-- Back Link -->
  <a class="inline-flex items-center gap-1.5 text-sm font-bold text-slate-400 hover:text-blue-500 transition-colors" href="/dashboard/follows">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回关注列表
  </a>

  <!-- Hero Section -->
  <section id="hero" class="bg-white/35 backdrop-blur-xl backdrop-saturate-[1.8] border border-white/50 shadow-glass rounded-2xl overflow-hidden">
    <div class="h-32 sm:h-36 bg-gradient-to-r from-sky-400 via-blue-500 to-violet-500"></div>
    <div class="grid grid-cols-[76px_1fr] sm:grid-cols-[104px_1fr_auto] gap-3 sm:gap-5 px-4 sm:px-7 pb-5 sm:pb-7 items-end -mt-9 sm:-mt-12">
      <div class="w-[76px] h-[76px] sm:w-[104px] sm:h-[104px] rounded-full bg-gradient-to-br from-blue-100 to-blue-200 border-[4px] sm:border-[5px] border-white/60 ring-2 ring-white/60 shadow-lg flex items-center justify-center text-blue-500 text-2xl sm:text-[34px] font-extrabold shrink-0">...</div>
      <div class="min-w-0">
        <h1 class="text-xl sm:text-2xl md:text-[34px] font-extrabold text-slate-800 leading-tight tracking-tight mb-1">加载中...</h1>
        <div class="text-sm text-slate-400">请稍候</div>
      </div>
    </div>
  </section>

  <!-- Content Card -->
  <section class="bg-white/35 backdrop-blur-xl backdrop-saturate-[1.8] border border-white/50 shadow-glass rounded-2xl p-4 sm:p-6">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
      <!-- Tabs -->
      <div class="flex bg-white/40 backdrop-blur-md border border-white/60 rounded-xl p-1 shadow-glass-sm">
        <button class="tab flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all text-blue-600 bg-white/60 shadow-glass-sm" data-category="single" onclick="switchTab('single')">单本</button>
        <button class="tab flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all text-slate-400 hover:text-slate-600" data-category="series" onclick="switchTab('series')">系列</button>
      </div>
      <span id="novelCount" class="text-sm font-semibold text-slate-400"></span>
    </div>

    <div id="novels" class="text-center py-12 text-slate-400">正在加载小说...</div>

    <div class="flex justify-center items-center gap-4 mt-5" id="pager" style="display:none;">
      <button id="prevBtn" class="bg-white/40 backdrop-blur-md border border-white/60 shadow-glass-sm rounded-xl px-4 py-2 text-sm font-bold text-slate-600 hover:bg-white/55 disabled:opacity-40 disabled:cursor-not-allowed transition-all">上一页</button>
      <span id="pagerText" class="text-sm font-semibold text-slate-400"></span>
      <button id="nextBtn" class="bg-white/40 backdrop-blur-md border border-white/60 shadow-glass-sm rounded-xl px-4 py-2 text-sm font-bold text-slate-600 hover:bg-white/55 disabled:opacity-40 disabled:cursor-not-allowed transition-all">下一页</button>
    </div>
  </section>

</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 left-auto bg-white/50 backdrop-blur-lg border border-white/50 shadow-glass-sm rounded-xl text-slate-800 px-5 py-3 text-sm font-medium z-[1000] hidden max-sm:left-4 max-sm:right-4 max-sm:text-center"></div>
{% endblock %}

{% block extra_scripts %}
<style>
  .novel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
  }
  @media (max-width: 640px) {
    .novel-grid { grid-template-columns: 1fr; gap: 10px; }
  }
</style>
<script>
  const pathParts = window.location.pathname.split('/');
  const userId = Number(pathParts[pathParts.length - 1] || 0);
  let currentPage = 1;
  let totalPages = 1;
  let currentCategory = 'single';

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"]/g, function (ch) {
      if (ch === '&') return '&amp;';
      if (ch === '<') return '&lt;';
      if (ch === '>') return '&gt;';
      if (ch === '"') return '&quot;';
      return ch;
    });
  }

  function formatNumber(value) {
    return Number(value || 0).toLocaleString('zh-CN');
  }

  function formatTextLength(chars) {
    const value = Number(chars || 0);
    if (!value) return '';
    if (value >= 10000) return (value / 10000).toFixed(1) + ' 万字';
    return formatNumber(value) + ' 字';
  }

  function showToast(message, duration) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.remove('hidden');
    toast.style.display = 'block';
    setTimeout(function () { toast.classList.add('hidden'); toast.style.display = ''; }, duration || 3000);
  }

  const statusColors = {
    normal: { label: '有小说', bg: 'bg-green-500/10', text: 'text-green-700', border: 'border-green-300/30' },
    no_novels: { label: '无小说', bg: 'bg-amber-500/10', text: 'text-amber-700', border: 'border-amber-300/30' },
    suspended: { label: '封号', bg: 'bg-red-500/10', text: 'text-red-700', border: 'border-red-300/30' },
    unknown: { label: '未知', bg: 'bg-slate-500/10', text: 'text-slate-600', border: 'border-slate-300/30' }
  };

  async function loadUser() {
    const resp = await fetch('/api/dashboard/users/' + encodeURIComponent(userId));
    const data = await resp.json();
    if (!resp.ok) {
      document.getElementById('hero').innerHTML = '<div class="h-32 sm:h-36 bg-gradient-to-r from-sky-400 via-blue-500 to-violet-500"></div><div class="px-4 sm:px-7 pb-5 sm:pb-7 -mt-9 sm:-mt-12"><div><h1 class="text-xl sm:text-2xl font-extrabold text-slate-800 mt-14">加载失败</h1><div class="text-sm text-slate-400 mt-1">未找到该用户</div></div></div>';
      return;
    }
    var avatar = data.avatar_url
      ? '<img class="w-[76px] h-[76px] sm:w-[104px] sm:h-[104px] rounded-full border-[4px] sm:border-[5px] border-white/60 ring-2 ring-white/60 shadow-lg object-cover shrink-0" src="/proxy/image?url=' + encodeURIComponent(data.avatar_url) + '" alt="avatar" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">'
      : '';
    var fallbackAvatar = '<div class="w-[76px] h-[76px] sm:w-[104px] sm:h-[104px] rounded-full bg-gradient-to-br from-blue-100 to-blue-200 border-[4px] sm:border-[5px] border-white/60 ring-2 ring-white/60 shadow-lg flex items-center justify-center text-blue-500 text-2xl sm:text-[34px] font-extrabold shrink-0" style="display:' + (data.avatar_url ? 'none' : 'flex') + ';">' + escapeHtml((data.name || 'U').slice(0, 2)) + '</div>';
    var account = data.account ? '@' + escapeHtml(data.account) : 'ID ' + escapeHtml(data.user_id);
    var status = statusColors[data.status] || statusColors.unknown;
    document.getElementById('hero').innerHTML =
      '<div class="h-32 sm:h-36 bg-gradient-to-r from-sky-400 via-blue-500 to-violet-500"></div>' +
      '<div class="grid grid-cols-[76px_1fr] sm:grid-cols-[104px_1fr_auto] gap-3 sm:gap-5 px-4 sm:px-7 pb-5 sm:pb-7 items-end -mt-9 sm:-mt-12">' +
        avatar + fallbackAvatar +
        '<div class="min-w-0">' +
          '<h1 class="text-xl sm:text-2xl md:text-[34px] font-extrabold text-slate-800 leading-tight tracking-tight mb-1">' + escapeHtml(data.name || '未命名用户') + '</h1>' +
          '<div class="flex flex-wrap gap-2 items-center">' +
            '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-xl bg-slate-500/10 text-slate-600 border border-slate-300/30 text-xs font-bold">' + account + '</span>' +
            '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-xl bg-blue-500/10 text-blue-700 border border-blue-300/30 text-xs font-bold">' + formatNumber(data.novel_count) + ' 篇小说</span>' +
            (data.last_checked_at ? '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-xl bg-slate-500/10 text-slate-600 border border-slate-300/30 text-xs font-bold">最后检查 ' + escapeHtml(data.last_checked_at) + '</span>' : '') +
            '<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-xl ' + status.bg + ' ' + status.text + ' border ' + status.border + ' text-xs font-bold">' + status.label + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="flex gap-2.5 flex-wrap justify-end col-span-full sm:col-span-1">' +
          '<button class="bg-white/40 backdrop-blur-md border border-white/60 shadow-glass-sm rounded-xl px-4 py-2.5 text-sm font-bold text-slate-600 hover:bg-white/55 transition-all" onclick="checkStatus()">检查状态</button>' +
          '<button class="bg-blue-500 text-white hover:bg-blue-600 rounded-xl shadow-glass-sm px-4 py-2.5 text-sm font-bold transition-all" onclick="syncAll()">备份全部</button>' +
        '</div>' +
      '</div>';
  }

  async function loadNovels(page) {
    var resp = await fetch('/api/dashboard/users/' + encodeURIComponent(userId) + '/novels?page=' + page + '&category=' + currentCategory);
    var data = await resp.json();
    var items = data.items || [];
    currentPage = data.page || 1;
    totalPages = data.total_pages || 1;
    document.getElementById('novelCount').textContent = '共 ' + formatNumber(data.total) + ' 项';
    var novels = document.getElementById('novels');
    if (!items.length) {
      novels.innerHTML = '<div class="text-center py-12 text-slate-400">暂无内容</div>';
      document.getElementById('pager').style.display = 'none';
      return;
    }
    if (currentCategory === 'series') {
      novels.innerHTML = '<div class="novel-grid">' + items.map(function (item) {
        var cover = item.cover_url
          ? '<img class="w-[58px] h-[80px] sm:w-[72px] sm:h-[98px] rounded-xl object-cover bg-gradient-to-br from-blue-50 to-indigo-50" src="/proxy/image?url=' + encodeURIComponent(item.cover_url) + '" alt="cover" onerror="this.style.background=\'linear-gradient(135deg,#dbeafe,#eef2ff)\';">'
          : '<div class="w-[58px] h-[80px] sm:w-[72px] sm:h-[98px] rounded-xl bg-gradient-to-br from-blue-50 to-indigo-50"></div>';
        var wordCount = formatTextLength(item.total_text_length);
        return '<a class="grid grid-cols-[58px_1fr] sm:grid-cols-[72px_1fr] gap-3 min-h-[90px] sm:min-h-[120px] p-3 rounded-xl bg-white/30 backdrop-blur-md border border-white/50 shadow-glass-sm text-slate-800 no-underline hover:bg-white/50 hover:shadow-glass transition-all" href="/dashboard/series/' + encodeURIComponent(item.series_id) + '">' +
          cover +
          '<div class="min-w-0 flex flex-col justify-center">' +
            '<div class="text-sm sm:text-[15px] font-extrabold leading-snug line-clamp-2">' + escapeHtml(item.series_title || '未命名系列') + '</div>' +
            '<div class="text-xs text-slate-400 mt-1.5">' + escapeHtml(item.author_name || '未知作者') + '</div>' +
            '<div class="text-xs text-slate-400 mt-0.5">' + formatNumber(item.chapter_count) + ' 章' + (wordCount ? ' \u00b7 ' + wordCount : '') + '</div>' +
          '</div>' +
        '</a>';
      }).join('') + '</div>';
    } else {
      novels.innerHTML = '<div class="novel-grid">' + items.map(function (item) {
        var cover = item.cover_url
          ? '<img class="w-[58px] h-[80px] sm:w-[72px] sm:h-[98px] rounded-xl object-cover bg-gradient-to-br from-blue-50 to-indigo-50" src="/proxy/image?url=' + encodeURIComponent(item.cover_url) + '" alt="cover" onerror="this.style.background=\'linear-gradient(135deg,#dbeafe,#eef2ff)\';">'
          : '<div class="w-[58px] h-[80px] sm:w-[72px] sm:h-[98px] rounded-xl bg-gradient-to-br from-blue-50 to-indigo-50"></div>';
        var seriesTag = item.series_title ? '<span class="inline-flex bg-blue-500/10 text-blue-700 border border-blue-300/30 rounded-xl px-1.5 py-0.5 text-[11px] font-bold ml-1">' + escapeHtml(item.series_title) + '</span>' : '';
        var wordCount = formatTextLength(item.text_length);
        return '<a class="grid grid-cols-[58px_1fr] sm:grid-cols-[72px_1fr] gap-3 min-h-[90px] sm:min-h-[120px] p-3 rounded-xl bg-white/30 backdrop-blur-md border border-white/50 shadow-glass-sm text-slate-800 no-underline hover:bg-white/50 hover:shadow-glass transition-all" href="/dashboard/novels/' + encodeURIComponent(item.novel_id) + '">' +
          cover +
          '<div class="min-w-0 flex flex-col justify-center">' +
            '<div class="text-sm sm:text-[15px] font-extrabold leading-snug line-clamp-2">' + escapeHtml(item.title || '未命名小说') + seriesTag + '</div>' +
            '<div class="text-xs text-slate-400 mt-1.5">' + (wordCount ? wordCount + ' \u00b7 ' : '') + '收藏 ' + formatNumber(item.total_bookmarks) + ' / 浏览 ' + formatNumber(item.total_views) + '</div>' +
          '</div>' +
        '</a>';
      }).join('') + '</div>';
    }
    document.getElementById('pager').style.display = 'flex';
    document.getElementById('pagerText').textContent = currentPage + ' / ' + totalPages;
    document.getElementById('prevBtn').disabled = currentPage <= 1;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages;
  }

  function switchTab(category) {
    currentCategory = category;
    document.querySelectorAll('.tab').forEach(function(t) {
      var isActive = t.dataset.category === category;
      t.classList.toggle('text-blue-600', isActive);
      t.classList.toggle('bg-white/60', isActive);
      t.classList.toggle('shadow-glass-sm', isActive);
      t.classList.toggle('text-slate-400', !isActive);
    });
    loadNovels(1);
  }

  async function checkStatus() {
    showToast('正在检查用户状态...');
    try {
      var resp = await fetch('/api/dashboard/users/' + encodeURIComponent(userId) + '/check', {method: 'POST'});
      var data = await resp.json();
      if (data.ok) {
        var status = statusColors[data.status] || statusColors.unknown;
        showToast('状态: ' + status.label);
        loadUser();
      } else {
        showToast('检查失败: ' + (data.error || '未知错误'));
      }
    } catch (err) {
      showToast('检查失败');
    }
  }

  async function syncAll() {
    if (!confirm('确定要备份该用户的全部小说吗？')) return;
    showToast('开始同步...');
    try {
      var resp = await fetch('/api/dashboard/users/' + encodeURIComponent(userId) + '/sync', {method: 'POST'});
      var data = await resp.json();
      if (data.ok) {
        showToast('备份任务已启动，可在首页查看进度');
      } else {
        showToast('启动失败: ' + (data.error || '未知错误'));
      }
    } catch (err) {
      showToast('启动失败');
    }
  }

  document.getElementById('prevBtn').addEventListener('click', function () {
    if (currentPage > 1) loadNovels(currentPage - 1);
  });
  document.getElementById('nextBtn').addEventListener('click', function () {
    if (currentPage < totalPages) loadNovels(currentPage + 1);
  });

  loadUser().then(function () { loadNovels(1); }).catch(function () {
    document.getElementById('novels').innerHTML = '<div class="text-center py-12 text-slate-400">加载失败</div>';
  });
</script>
{% endblock %}
