<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户详情 - Pixiv 小说同步器</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-soft: #f4f6fb;
      --text: #1f2330;
      --text-secondary: #6f7685;
      --line: #e5e8ef;
      --brand: #0096fa;
      --brand-soft: rgba(0, 150, 250, 0.10);
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --shadow: 0 16px 36px rgba(31, 35, 48, 0.08);
      --radius: 14px;
      --radius-lg: 22px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    .topbar { position: sticky; top: 0; z-index: 10; background: rgba(255,255,255,0.86); backdrop-filter: blur(18px); border-bottom: 1px solid var(--line); }
    .topbar-inner { max-width: 1160px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; min-height: 58px; gap: 16px; }
    .brand { font-size: 17px; font-weight: 800; color: var(--brand); }
    .nav { display: flex; gap: 2px; overflow-x: auto; white-space: nowrap; }
    .nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 9px 12px; border-radius: 999px; }
    .nav a:hover, .nav a.active { color: var(--brand); background: var(--brand-soft); }
    .page { max-width: 1160px; margin: 0 auto; padding: 24px 24px 56px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 700; margin: 0 0 14px; }
    .back-link:hover { color: var(--brand); }
    .hero { position: relative; overflow: hidden; background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid rgba(229,232,239,0.8); }
    .hero-cover { height: 132px; background: linear-gradient(135deg, #75c8ff 0%, #0096fa 48%, #7c3aed 100%); }
    .profile { display: grid; grid-template-columns: 104px 1fr auto; gap: 22px; padding: 0 28px 28px; align-items: end; margin-top: -48px; }
    .avatar, .empty-avatar { width: 104px; height: 104px; border-radius: 50%; border: 5px solid #fff; object-fit: cover; box-shadow: 0 10px 24px rgba(0,0,0,0.14); background: linear-gradient(135deg, #dbeafe, #bfdbfe); flex-shrink: 0; }
    .empty-avatar { display: flex; align-items: center; justify-content: center; color: var(--brand); font-size: 34px; font-weight: 800; }
    .user-name { margin: 0 0 6px; font-size: clamp(24px, 4vw, 34px); line-height: 1.18; letter-spacing: -0.03em; }
    .user-meta { color: var(--text-secondary); font-size: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: var(--surface-soft); color: var(--text-secondary); font-size: 12px; font-weight: 700; }
    .status-badge { color: #fff; }
    .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .btn { border: none; border-radius: 999px; padding: 10px 16px; font-size: 14px; font-weight: 800; cursor: pointer; transition: transform .18s, box-shadow .18s, background .18s; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 8px 18px rgba(0,150,250,.25); }
    .btn-secondary { background: var(--surface-soft); color: var(--text); }
    .content-grid { display: grid; grid-template-columns: minmax(0, 1fr); gap: 18px; margin-top: 18px; }
    .card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid rgba(229,232,239,0.8); padding: 22px; }
    .card-head { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
    .tabs { display: flex; gap: 8px; background: var(--surface-soft); border-radius: 999px; padding: 4px; }
    .tab { border: none; background: transparent; padding: 8px 16px; border-radius: 999px; color: var(--text-secondary); font-weight: 800; cursor: pointer; }
    .tab.active { background: var(--surface); color: var(--brand); box-shadow: 0 3px 10px rgba(31,35,48,.08); }
    .count { color: var(--text-secondary); font-size: 13px; font-weight: 700; }
    .novel-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .novel-item { display: grid; grid-template-columns: 72px 1fr; gap: 13px; min-height: 120px; background: var(--surface-soft); border: 1px solid transparent; border-radius: var(--radius); padding: 12px; text-decoration: none; color: var(--text); transition: border .18s, transform .18s, background .18s; }
    .novel-item:hover { border-color: rgba(0,150,250,.25); background: #fff; transform: translateY(-1px); }
    .novel-cover { width: 72px; height: 98px; border-radius: 10px; object-fit: cover; background: linear-gradient(135deg, #dbeafe, #eef2ff); }
    .novel-info { min-width: 0; display: flex; flex-direction: column; justify-content: center; }
    .novel-title { font-size: 15px; font-weight: 800; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .novel-meta { font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }
    .series-tag { display: inline-flex; color: var(--brand); background: var(--brand-soft); padding: 2px 7px; border-radius: 999px; font-size: 11px; font-weight: 800; margin-left: 4px; }
    .pager { display: flex; justify-content: center; align-items: center; gap: 14px; margin-top: 22px; }
    .pager-btn { border: none; border-radius: 999px; padding: 9px 16px; font-weight: 800; background: var(--surface-soft); color: var(--text); cursor: pointer; }
    .pager-btn:disabled { opacity: .4; cursor: not-allowed; }
    .loading, .empty { text-align: center; padding: 52px 18px; color: var(--text-secondary); }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1f2330; color: #fff; padding: 12px 18px; border-radius: 999px; font-size: 14px; z-index: 1000; display: none; box-shadow: var(--shadow); }
    @media (max-width: 760px) {
      .topbar-inner { align-items: flex-start; flex-direction: column; padding: 10px 14px; gap: 8px; }
      .page { padding: 12px 10px 36px; }
      .back-link { margin-bottom: 10px; }
      .hero-cover { height: 76px; }
      .profile { grid-template-columns: 76px minmax(0, 1fr); gap: 12px; text-align: left; justify-items: stretch; align-items: end; padding: 0 14px 16px; margin-top: -34px; }
      .avatar, .empty-avatar { width: 76px; height: 76px; border-width: 4px; font-size: 24px; }
      .user-name { font-size: 22px; margin-bottom: 6px; }
      .user-meta { gap: 6px; }
      .pill { padding: 4px 8px; font-size: 11px; }
      .quick-actions { grid-column: 1 / -1; justify-content: stretch; width: 100%; }
      .btn { flex: 1; min-width: 0; padding: 9px 12px; }
      .content-grid { margin-top: 10px; }
      .card { padding: 12px; border-radius: 16px; }
      .card-head { align-items: stretch; flex-direction: column; margin-bottom: 12px; }
      .tabs { width: 100%; }
      .tab { flex: 1; padding: 8px 10px; }
      .novel-list { grid-template-columns: 1fr; gap: 10px; }
      .novel-item { grid-template-columns: 58px 1fr; min-height: 90px; padding: 9px; gap: 10px; }
      .novel-cover { width: 58px; height: 80px; border-radius: 8px; }
      .novel-title { font-size: 14px; }
      .novel-meta { margin-top: 4px; }
      .toast { left: 16px; right: 16px; text-align: center; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Pixiv 小说同步器</div>
      <nav class="nav">
        <a href="/dashboard">首页</a>
        <a class="active" href="/dashboard/follows">关注</a>
        <a href="/dashboard/novels">小说</a>
        <a href="/dashboard/logs">日志</a>
        <a href="/dashboard/settings">设置</a>
        <a href="/token-login">登录</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <a class="back-link" href="/dashboard/follows">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      返回关注列表
    </a>

    <section id="hero" class="hero">
      <div class="hero-cover"></div>
      <div class="profile">
        <div class="empty-avatar">...</div>
        <div>
          <h1 class="user-name">加载中...</h1>
          <div class="user-meta">请稍候</div>
        </div>
      </div>
    </section>

    <section class="content-grid">
      <div class="card">
        <div class="card-head">
          <div class="tabs">
            <button class="tab active" data-category="single" onclick="switchTab('single')">单本</button>
            <button class="tab" data-category="series" onclick="switchTab('series')">系列</button>
          </div>
          <span id="novelCount" class="count"></span>
        </div>
        <div id="novels" class="loading">正在加载小说...</div>
        <div class="pager" id="pager" style="display:none;">
          <button id="prevBtn" class="pager-btn">上一页</button>
          <span id="pagerText" class="count"></span>
          <button id="nextBtn" class="pager-btn">下一页</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const pathParts = window.location.pathname.split('/');
    const userId = Number(pathParts[pathParts.length - 1] || 0);
    let currentPage = 1;
    let totalPages = 1;
    let currentCategory = 'single';

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, function (ch) {
        if (ch === '&') return '&amp;';
        if (ch === '<') return '&lt;';
        if (ch === '>') return '&gt;';
        if (ch === '"') return '&quot;';
        return ch;
      });
    }

    function formatNumber(value) {
      return Number(value || 0).toLocaleString('zh-CN');
    }

    function formatTextLength(chars) {
      const value = Number(chars || 0);
      if (!value) return '';
      if (value >= 10000) return (value / 10000).toFixed(1) + ' 万字';
      return formatNumber(value) + ' 字';
    }

    function showToast(message, duration) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(function () { toast.style.display = 'none'; }, duration || 3000);
    }

    const statusMap = {
      normal: {label: '有小说', color: 'var(--success)'},
      no_novels: {label: '无小说', color: 'var(--warning)'},
      suspended: {label: '封号', color: 'var(--danger)'},
      unknown: {label: '未知', color: 'var(--text-secondary)'}
    };

    async function loadUser() {
      const resp = await fetch(`/api/dashboard/users/${encodeURIComponent(userId)}`);
      const data = await resp.json();
      if (!resp.ok) {
        document.getElementById('hero').innerHTML = '<div class="hero-cover"></div><div class="profile"><div><h1 class="user-name">加载失败</h1><div class="user-meta">未找到该用户</div></div></div>';
        return;
      }
      const avatar = data.avatar_url
        ? `<img class="avatar" src="/proxy/image?url=${encodeURIComponent(data.avatar_url)}" alt="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
        : '';
      const fallbackAvatar = `<div class="empty-avatar" style="display:${data.avatar_url ? 'none' : 'flex'};">${escapeHtml((data.name || 'U').slice(0, 2))}</div>`;
      const account = data.account ? `@${escapeHtml(data.account)}` : `ID ${escapeHtml(data.user_id)}`;
      const status = statusMap[data.status] || statusMap.unknown;
      document.getElementById('hero').innerHTML = `
        <div class="hero-cover"></div>
        <div class="profile">
          ${avatar}${fallbackAvatar}
          <div>
            <h1 class="user-name">${escapeHtml(data.name || '未命名用户')}</h1>
            <div class="user-meta">
              <span class="pill">${account}</span>
              <span class="pill">${formatNumber(data.novel_count)} 篇小说</span>
              ${data.last_checked_at ? `<span class="pill">最后检查 ${escapeHtml(data.last_checked_at)}</span>` : ''}
              <span class="pill status-badge" style="background:${status.color};">● ${status.label}</span>
            </div>
          </div>
          <div class="quick-actions">
            <button class="btn btn-secondary" onclick="checkStatus()">检查状态</button>
            <button class="btn btn-primary" onclick="syncAll()">备份全部</button>
          </div>
        </div>
      `;
    }

    async function loadNovels(page) {
      const resp = await fetch(`/api/dashboard/users/${encodeURIComponent(userId)}/novels?page=${page}&category=${currentCategory}`);
      const data = await resp.json();
      const items = data.items || [];
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;
      document.getElementById('novelCount').textContent = `共 ${formatNumber(data.total)} 项`;
      const novels = document.getElementById('novels');
      if (!items.length) {
        novels.innerHTML = '<div class="empty">暂无内容</div>';
        document.getElementById('pager').style.display = 'none';
        return;
      }
      if (currentCategory === 'series') {
        novels.innerHTML = '<div class="novel-list">' + items.map(function (item) {
          const cover = item.cover_url
            ? `<img class="novel-cover" src="/proxy/image?url=${encodeURIComponent(item.cover_url)}" alt="cover" onerror="this.style.background='var(--line)';">`
            : '<div class="novel-cover"></div>';
          const wordCount = formatTextLength(item.total_text_length);
          return `
            <a class="novel-item" href="/dashboard/series/${encodeURIComponent(item.series_id)}">
              ${cover}
              <div class="novel-info">
                <div class="novel-title">${escapeHtml(item.series_title || '未命名系列')}</div>
                <div class="novel-meta">${escapeHtml(item.author_name || '未知作者')}</div>
                <div class="novel-meta">${formatNumber(item.chapter_count)} 章${wordCount ? ' · ' + wordCount : ''}</div>
              </div>
            </a>
          `;
        }).join('') + '</div>';
      } else {
        novels.innerHTML = '<div class="novel-list">' + items.map(function (item) {
          const cover = item.cover_url
            ? `<img class="novel-cover" src="/proxy/image?url=${encodeURIComponent(item.cover_url)}" alt="cover" onerror="this.style.background='var(--line)';">`
            : '<div class="novel-cover"></div>';
          const seriesTag = item.series_title ? `<span class="series-tag">${escapeHtml(item.series_title)}</span>` : '';
          const wordCount = formatTextLength(item.text_length);
          return `
            <a class="novel-item" href="/dashboard/novels/${encodeURIComponent(item.novel_id)}">
              ${cover}
              <div class="novel-info">
                <div class="novel-title">${escapeHtml(item.title || '未命名小说')}${seriesTag}</div>
                <div class="novel-meta">${wordCount ? wordCount + ' · ' : ''}收藏 ${formatNumber(item.total_bookmarks)} / 浏览 ${formatNumber(item.total_views)}</div>
              </div>
            </a>
          `;
        }).join('') + '</div>';
      }
      document.getElementById('pager').style.display = 'flex';
      document.getElementById('pagerText').textContent = `${currentPage} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }

    function switchTab(category) {
      currentCategory = category;
      document.querySelectorAll('.tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.category === category);
      });
      loadNovels(1);
    }

    async function checkStatus() {
      showToast('正在检查用户状态...');
      try {
        const resp = await fetch(`/api/dashboard/users/${encodeURIComponent(userId)}/check`, {method: 'POST'});
        const data = await resp.json();
        if (data.ok) {
          const status = statusMap[data.status] || statusMap.unknown;
          showToast('状态: ' + status.label);
          loadUser();
        } else {
          showToast('检查失败: ' + (data.error || '未知错误'));
        }
      } catch (err) {
        showToast('检查失败');
      }
    }

    async function syncAll() {
      if (!confirm('确定要备份该用户的全部小说吗？')) return;
      showToast('开始同步...');
      try {
        const resp = await fetch(`/api/dashboard/users/${encodeURIComponent(userId)}/sync`, {method: 'POST'});
        const data = await resp.json();
        if (data.ok) {
          showToast(`同步完成: ${data.stats.novels || 0} 篇小说`);
          loadUser();
          loadNovels(1);
        } else {
          showToast('同步失败: ' + (data.error || '未知错误'));
        }
      } catch (err) {
        showToast('同步失败');
      }
    }

    document.getElementById('prevBtn').addEventListener('click', function () {
      if (currentPage > 1) loadNovels(currentPage - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', function () {
      if (currentPage < totalPages) loadNovels(currentPage + 1);
    });

    loadUser().then(function () { loadNovels(1); }).catch(function () {
      document.getElementById('novels').innerHTML = '<div class="empty">加载失败</div>';
    });
  </script>
</body>
</html>
