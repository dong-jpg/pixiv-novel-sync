{% extends "base.html" %}

{% block title %}关注作者 - Pixiv 小说同步器{% endblock %}

{% block content %}
<div class="space-y-6 max-w-6xl mx-auto">

  <!-- Header -->
  <div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">关注作者</h1>
    <p class="text-sm text-gray-500">展示已同步到本地的关注作者列表，支持按状态筛选。</p>
  </div>

  <!-- Main Card -->
  <section class="bg-white border border-gray-200 rounded-lg p-5 sm:p-6 shadow-sm">

    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6 border-b border-gray-100 pb-4">
      <!-- Tabs -->
      <div class="flex items-center gap-1 p-1 bg-gray-50 border border-gray-200 rounded-lg w-full sm:w-auto overflow-x-auto">
        <button v-for="tab in tabs" :key="tab.value"
          @click="status = tab.value"
          class="px-4 py-1.5 text-sm font-medium rounded-md transition-colors whitespace-nowrap"
          :class="status === tab.value ? 'bg-white text-brand-600 shadow-sm border border-gray-200' : 'text-gray-600 hover:text-gray-900'">
          {{ tab.label }}
        </button>
      </div>

      <!-- Summary -->
      <div class="text-sm font-medium text-gray-500 self-end sm:self-auto">
        <span v-if="loading">加载中...</span>
        <span v-else>共 <span class="font-bold text-gray-900">{{ totalItems }}</span> 人</span>
      </div>
    </div>

    <!-- Error State -->
    <div v-if="error" class="text-center py-16">
      <div class="text-red-500 mb-2">
        <svg class="mx-auto h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <p class="text-sm text-red-600">{{ error }}</p>
    </div>

    <!-- Empty State -->
    <div v-else-if="!loading && items.length === 0" class="text-center py-16">
      <svg class="mx-auto h-10 w-10 text-gray-300 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
      <p class="text-sm text-gray-500">暂无数据</p>
    </div>

    <!-- List Grid -->
    <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Skeleton Loading -->
      <template v-if="loading">
        <div v-for="i in 6" :key="i" class="bg-white border border-gray-100 rounded-md p-4 flex items-center gap-4">
          <div class="w-12 h-12 bg-gray-100 rounded-full flex-shrink-0 animate-pulse"></div>
          <div class="flex-1 space-y-2 py-1">
            <div class="h-4 bg-gray-100 rounded w-3/4 animate-pulse"></div>
            <div class="h-3 bg-gray-100 rounded w-1/2 animate-pulse"></div>
          </div>
        </div>
      </template>

      <!-- Actual Items -->
      <template v-else>
        <a v-for="item in items" :key="item.user_id" :href="'/dashboard/users/' + encodeURIComponent(item.user_id)"
           class="group flex items-center gap-4 bg-white border border-gray-200 rounded-md p-4 hover:border-brand-300 hover:shadow-sm transition-all">

          <!-- Avatar -->
          <div class="flex-shrink-0">
            <img v-if="item.avatar_url" :src="'/proxy/image?url=' + encodeURIComponent(item.avatar_url)"
                 class="w-12 h-12 rounded-full object-cover border border-gray-100" @error="item.avatar_url = ''">
            <div v-else class="w-12 h-12 rounded-full flex items-center justify-center bg-brand-100 text-brand-600 font-bold text-lg border border-brand-200">
              {{ (item.name || 'U').substring(0, 2) }}
            </div>
          </div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between gap-2 mb-1">
              <h3 class="text-base font-bold text-gray-900 truncate group-hover:text-brand-600 transition-colors" :title="item.name">
                {{ item.name || '未命名用户' }}
              </h3>
              <!-- Status Badge -->
              <span class="inline-flex items-center px-1.5 py-0.5 text-[10px] font-bold rounded flex-shrink-0" :class="statusConfig(item.status).badgeClass">
                <span class="w-1.5 h-1.5 rounded-full mr-1" :class="statusConfig(item.status).dotClass"></span>
                {{ statusConfig(item.status).label }}
              </span>
            </div>
            <div class="text-xs text-gray-500 truncate mb-1">
              {{ item.account ? '@' + item.account : 'ID ' + item.user_id }} <span class="mx-1 text-gray-300">|</span> 小说 {{ item.novel_count || 0 }} 篇
            </div>
            <div class="text-[10px] text-gray-400 font-mono truncate">
              更新于 {{ (item.updated_at || '-').substring(0, 10) }}
            </div>
          </div>
        </a>
      </template>
    </div>

    <!-- Pagination -->
    <app-pagination
      v-if="!loading && !error"
      :page="page"
      :pages="totalPages"
      @update:page="handlePageChange"
    ></app-pagination>

  </section>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  initVueApp({
    setup() {
      const { ref, watch, onMounted } = Vue;

      // State
      const items = ref([]);
      const totalItems = ref(0);
      const page = ref(1);
      const totalPages = ref(1);
      const loading = ref(true);
      const error = ref(null);
      const status = ref('all');

      const tabs = [
        { label: '全部', value: 'all' },
        { label: '有小说', value: 'normal' },
        { label: '无小说', value: 'no_novels' },
        { label: '封号', value: 'suspended' }
      ];

      let fetchAbortController = null;

      // Methods
      const fetchData = async () => {
        loading.value = true;
        error.value = null;

        if (fetchAbortController) {
          fetchAbortController.abort();
        }
        fetchAbortController = new AbortController();

        try {
          const res = await fetch(`/api/dashboard/users?page=${page.value}&status=${status.value}`, {
            signal: fetchAbortController.signal
          });

          if (!res.ok) throw new Error('API Request Failed');

          const data = await res.json();
          items.value = data.items || [];
          totalItems.value = data.total || 0;
          page.value = data.page || 1;
          totalPages.value = data.total_pages || 1;

        } catch (err) {
          if (err.name !== 'AbortError') {
            console.error(err);
            error.value = '加载失败，请检查网络连接或稍后重试。';
            items.value = [];
          }
        } finally {
          if (fetchAbortController && !fetchAbortController.signal.aborted) {
            loading.value = false;
          }
        }
      };

      const handlePageChange = (newPage) => {
        page.value = newPage;
        fetchData();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const statusConfig = (s) => {
        const map = {
          normal: { label: '有小说', badgeClass: 'bg-green-50 text-green-700 border border-green-200', dotClass: 'bg-green-500' },
          no_novels: { label: '无小说', badgeClass: 'bg-yellow-50 text-yellow-700 border border-yellow-200', dotClass: 'bg-yellow-500' },
          suspended: { label: '封号', badgeClass: 'bg-red-50 text-red-700 border border-red-200', dotClass: 'bg-red-500' },
          unknown: { label: '未知', badgeClass: 'bg-gray-50 text-gray-700 border border-gray-200', dotClass: 'bg-gray-500' }
        };
        return map[s] || map.unknown;
      };

      // Watchers
      watch(status, () => {
        page.value = 1;
        fetchData();
      });

      onMounted(() => {
        fetchData();
      });

      return {
        items, totalItems, page, totalPages, loading, error, status, tabs,
        handlePageChange, statusConfig
      };
    }
  });
</script>
{% endblock %}
