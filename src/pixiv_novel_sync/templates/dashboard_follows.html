{% extends "base.html" %}

{% block title %}关注作者 - Pixiv 小说同步器{% endblock %}

{% block content %}
<div class="space-y-6 max-w-6xl mx-auto">

  <!-- Header -->
  <div>
    <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight mb-2">关注作者</h1>
    <p class="text-sm sm:text-base text-slate-600">展示已同步到本地的关注作者列表，支持按状态筛选。</p>
  </div>

  <!-- Main Card -->
  <section class="bg-white/35 backdrop-blur-xl backdrop-saturate-[1.8] border border-white/50 shadow-glass rounded-2xl p-5 sm:p-6">

    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
      <!-- Tabs -->
      <div class="flex flex-wrap items-center gap-2 p-1 bg-white/30 backdrop-blur-md border border-white/40 rounded-xl w-full sm:w-auto" id="tabs">
        <button class="tab-btn active px-4 py-1.5 text-sm font-semibold rounded-xl transition-all bg-blue-500/10 text-blue-600 border border-blue-300/30 shadow-glass-sm" data-status="all">全部</button>
        <button class="tab-btn px-4 py-1.5 text-sm font-semibold rounded-xl transition-all text-slate-600 hover:text-slate-800 hover:bg-white/40" data-status="normal">有小说</button>
        <button class="tab-btn px-4 py-1.5 text-sm font-semibold rounded-xl transition-all text-slate-600 hover:text-slate-800 hover:bg-white/40" data-status="no_novels">无小说</button>
        <button class="tab-btn px-4 py-1.5 text-sm font-semibold rounded-xl transition-all text-slate-600 hover:text-slate-800 hover:bg-white/40" data-status="suspended">封号</button>
      </div>

      <!-- Summary -->
      <div id="summary" class="text-sm font-medium text-slate-600 bg-white/40 backdrop-blur-md border border-white/50 px-3 py-1.5 rounded-xl shadow-glass-sm self-end sm:self-auto">加载中...</div>
    </div>

    <!-- List Grid -->
    <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Skeleton Loading -->
      <div class="bg-white/30 animate-pulse rounded-2xl p-4 flex items-center gap-4 border border-white/40">
        <div class="w-12 h-12 bg-white/40 rounded-full flex-shrink-0"></div>
        <div class="flex-1 space-y-2 py-1">
          <div class="h-4 bg-white/40 rounded w-3/4"></div>
          <div class="h-3 bg-white/40 rounded w-1/2"></div>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-center gap-4 mt-8 pt-6 border-t border-white/30">
      <button id="prevBtn" class="px-4 py-2 bg-white/40 backdrop-blur-md border border-white/60 shadow-glass-sm rounded-xl text-slate-600 text-sm font-semibold hover:bg-white/55 focus:outline-none focus:ring-2 focus:ring-blue-500/50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">上一页</button>
      <span id="pagerText" class="text-sm font-mono font-medium text-slate-600"></span>
      <button id="nextBtn" class="px-4 py-2 bg-white/40 backdrop-blur-md border border-white/60 shadow-glass-sm rounded-xl text-slate-600 text-sm font-semibold hover:bg-white/55 focus:outline-none focus:ring-2 focus:ring-blue-500/50 disabled:opacity-50 disabled:cursor-not-allowed transition-all">下一页</button>
    </div>

  </section>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  let currentPage = 1;
  let totalPages = 1;
  let currentStatus = 'all';

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"]/g, function (ch) {
      if (ch === '&') return '&amp;';
      if (ch === '<') return '&lt;';
      if (ch === '>') return '&gt;';
      if (ch === '"') return '&quot;';
      return ch;
    });
  }

  const statusMap = {
    normal: {label: '有小说', colorClass: 'bg-green-500/10 text-green-700 border border-green-300/30 rounded-xl', dot: 'bg-green-500'},
    no_novels: {label: '无小说', colorClass: 'bg-yellow-500/10 text-yellow-700 border border-yellow-300/30 rounded-xl', dot: 'bg-yellow-500'},
    suspended: {label: '封号', colorClass: 'bg-red-500/10 text-red-700 border border-red-300/30 rounded-xl', dot: 'bg-red-500'},
    unknown: {label: '未知', colorClass: 'bg-slate-500/10 text-slate-700 border border-slate-300/30 rounded-xl', dot: 'bg-slate-500'}
  };

  async function loadFollows(page) {
    const list = document.getElementById('list');

    try {
      const resp = await fetch(`/api/dashboard/users?page=${page}&status=${currentStatus}`);
      const data = await resp.json();
      const items = data.items || [];
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;

      document.getElementById('summary').innerHTML = `共 <span class="font-bold text-slate-800">${data.total || 0}</span> 人`;
      document.getElementById('pagerText').textContent = `${currentPage} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;

      if (!items.length) {
        list.className = "flex justify-center py-16";
        list.innerHTML = `
          <div class="text-center text-slate-400">
            <svg class="mx-auto h-10 w-10 mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <p>暂无数据</p>
          </div>`;
        return;
      }

      list.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4";
      list.innerHTML = items.map(function (item) {
        const avatar = item.avatar_url
          ? `<img class="w-12 h-12 rounded-full object-cover shadow-glass-sm bg-white/30" src="/proxy/image?url=${encodeURIComponent(item.avatar_url)}" alt="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
          : '';
        const fallbackAvatar = `<div class="w-12 h-12 rounded-full flex items-center justify-center bg-gradient-to-br from-white/50 to-white/30 text-slate-600 font-bold text-lg shadow-glass-sm border border-white/50" style="display:${item.avatar_url ? 'none' : 'flex'};">${escapeHtml((item.name || 'U').slice(0, 2))}</div>`;
        const account = item.account ? `@${escapeHtml(item.account)}` : `ID ${escapeHtml(item.user_id)}`;
        const status = statusMap[item.status] || statusMap.unknown;

        return `
          <a href="/dashboard/users/${encodeURIComponent(item.user_id)}" class="group flex items-center gap-4 bg-white/25 hover:bg-white/40 border border-white/40 hover:border-white/60 rounded-xl p-4 transition-all hover:shadow-glass-sm backdrop-blur-md">
            <div class="flex-shrink-0">${avatar}${fallbackAvatar}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-2 mb-1">
                <h3 class="text-base font-bold text-slate-800 truncate group-hover:text-brand-600 transition-colors">${escapeHtml(item.name || '未命名用户')}</h3>
                <span class="inline-flex items-center px-2 py-0.5 text-[10px] font-bold ${status.colorClass} flex-shrink-0"><span class="w-1.5 h-1.5 rounded-full ${status.dot} mr-1"></span>${status.label}</span>
              </div>
              <div class="text-xs text-slate-600 truncate mb-1">${account} <span class="mx-1">·</span> 小说 ${item.novel_count || 0} 篇</div>
              <div class="text-[10px] text-slate-400 font-mono truncate">更新于 ${escapeHtml(item.updated_at || '-').substring(0,10)}</div>
            </div>
          </a>
        `;
      }).join('');
    } catch(err) {
      document.getElementById('summary').textContent = '加载失败';
    }
  }

  document.getElementById('tabs').addEventListener('click', function (e) {
    const btn = e.target.closest('.tab-btn');
    if (!btn) return;
    currentStatus = btn.dataset.status;

    document.querySelectorAll('.tab-btn').forEach(function (t) {
      if (t === btn) {
        t.classList.add('active', 'bg-blue-500/10', 'text-blue-600', 'border', 'border-blue-300/30', 'shadow-glass-sm');
        t.classList.remove('text-slate-600', 'hover:text-slate-800', 'hover:bg-white/40');
      } else {
        t.classList.remove('active', 'bg-blue-500/10', 'text-blue-600', 'border', 'border-blue-300/30', 'shadow-glass-sm');
        t.classList.add('text-slate-600', 'hover:text-slate-800', 'hover:bg-white/40');
      }
    });

    loadFollows(1);
  });

  document.getElementById('prevBtn').addEventListener('click', function () {
    if (currentPage > 1) loadFollows(currentPage - 1);
  });

  document.getElementById('nextBtn').addEventListener('click', function () {
    if (currentPage < totalPages) loadFollows(currentPage + 1);
  });

  loadFollows(1);
</script>
{% endblock %}
