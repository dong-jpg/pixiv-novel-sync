<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>关注作者 - Pixiv 小说同步器</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --line: #d2d2d7;
      --brand-start: #007aff;
      --brand-end: #5856d6;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--bg-soft); color: var(--text); -webkit-font-smoothing: antialiased; }
    .topbar { background: #fff; border-bottom: 2px solid transparent; background-image: linear-gradient(#fff, #fff), linear-gradient(90deg, var(--brand-start), var(--brand-end)); background-origin: padding-box, border-box; background-clip: padding-box, border-box; }
    .topbar-inner { max-width: 1080px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .brand { font-size: 17px; font-weight: 600; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav { display: flex; gap: 4px; }
    .nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; transition: all 0.2s; position: relative; }
    .nav a:hover { color: var(--text); background: rgba(0,122,255,0.06); }
    .nav a.active { color: var(--brand-start); font-weight: 600; }
    .nav a.active::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); border-radius: 1px; }
    .page { max-width: 1080px; margin: 0 auto; padding: 32px 24px 56px; }
    .page-title { font-size: 28px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    .page-desc { color: var(--text-secondary); margin: 0 0 24px; font-size: 15px; }
    .card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--card-shadow); padding: 24px; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .summary { color: var(--text-secondary); font-size: 13px; }
    .list { display: grid; gap: 12px; }
    .item { display: flex; gap: 16px; align-items: center; background: var(--bg-soft); border-radius: var(--radius); padding: 16px 20px; transition: all 0.2s; }
    .item:hover { background: #ebebed; }
    .avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, var(--brand-start), var(--brand-end)); flex-shrink: 0; }
    .empty-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--line); color: var(--text-secondary); font-weight: 600; font-size: 18px; flex-shrink: 0; }
    .info { flex: 1; min-width: 0; }
    .name { font-size: 16px; font-weight: 600; }
    .sub { color: var(--text-secondary); font-size: 13px; margin-top: 3px; }
    .pager { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 24px; }
    .btn { border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: var(--bg-soft); color: var(--text); }
    .btn:hover:not(:disabled) { background: #e8e8ed; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
    @media (max-width: 720px) {
      .topbar-inner { flex-direction: column; height: auto; padding: 12px 16px; gap: 8px; }
      .toolbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Pixiv 小说同步器</div>
      <nav class="nav">
        <a href="/dashboard">首页</a>
        <a class="active" href="/dashboard/follows">关注</a>
        <a href="/dashboard/novels">小说</a>
        <a href="/dashboard/settings">设置</a>
        <a href="/token-login">登录</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">关注作者</h1>
    <p class="page-desc">展示已同步到本地的关注作者列表，分页加载每页 10 条。</p>

    <section class="card">
      <div class="toolbar">
        <div id="summary" class="summary">加载中...</div>
        <div id="pageInfo" class="summary"></div>
      </div>
      <div id="list" class="list"></div>
      <div class="pager">
        <button id="prevBtn" class="btn">上一页</button>
        <span id="pagerText" class="summary"></span>
        <button id="nextBtn" class="btn">下一页</button>
      </div>
    </section>
  </main>

  <script>
    let currentPage = 1;
    let totalPages = 1;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, function (ch) {
        if (ch === '&') return '&';
        if (ch === '<') return '<';
        if (ch === '>') return '>';
        if (ch === '"') return '"';
        return ch;
      });
    }

    async function loadFollows(page) {
      const resp = await fetch(`/api/dashboard/follows?page=${page}`);
      const data = await resp.json();
      const items = data.items || [];
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;
      document.getElementById('summary').textContent = `共 ${data.total || 0} 位作者`;
      document.getElementById('pageInfo').textContent = '每页 10 条';
      document.getElementById('pagerText').textContent = `${currentPage} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
      const list = document.getElementById('list');
      if (!items.length) {
        list.innerHTML = '<div class="empty-state">暂无数据，请先执行一次手工同步</div>';
        return;
      }
      list.innerHTML = items.map(function (item) {
        const avatar = item.avatar_url
          ? `<img class="avatar" src="/proxy/image?url=${encodeURIComponent(item.avatar_url)}" alt="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
          : '';
        const fallbackAvatar = `<div class="empty-avatar" style="display:${item.avatar_url ? 'none' : 'flex'};">${escapeHtml((item.name || 'U').slice(0, 2))}</div>`;
        const account = item.account ? `@${escapeHtml(item.account)}` : `ID ${escapeHtml(item.user_id)}`;
        return `
          <article class="item">
            ${avatar}${fallbackAvatar}
            <div class="info">
              <div class="name">${escapeHtml(item.name || '未命名用户')}</div>
              <div class="sub">${account}</div>
            </div>
            <div class="sub" style="flex-shrink:0;">更新于 ${escapeHtml(item.updated_at || '-')}</div>
          </article>
        `;
      }).join('');
    }

    document.getElementById('prevBtn').addEventListener('click', function () {
      if (currentPage > 1) loadFollows(currentPage - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', function () {
      if (currentPage < totalPages) loadFollows(currentPage + 1);
    });

    loadFollows(1).catch(function () {
      document.getElementById('summary').textContent = '加载失败';
    });
  </script>
</body>
</html>
