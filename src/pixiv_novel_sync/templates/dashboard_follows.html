<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixiv Dashboard Follows</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 1000px; margin: 32px auto; padding: 24px; }
    .nav { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .nav a { color: white; text-decoration: none; background: #1d4ed8; padding: 10px 14px; border-radius: 8px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 14px; padding: 20px; }
    .muted { color: #94a3b8; }
    .list { display: grid; gap: 12px; margin-top: 18px; }
    .item { display: flex; gap: 14px; align-items: center; background: #0b1220; border: 1px solid #334155; border-radius: 12px; padding: 14px; }
    .avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 1px solid #475569; background: #111827; }
    .name { font-size: 18px; font-weight: bold; }
    .sub { color: #94a3b8; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="/dashboard">首页</a>
      <a href="/dashboard/follows">关注</a>
      <a href="/dashboard/novels">小说</a>
      <a href="/dashboard/settings">设置</a>
      <a href="/token-login">Token 登录</a>
    </div>
    <div class="card">
      <h1>关注页面</h1>
      <p class="muted">展示最近同步到本地数据库的作者列表。</p>
      <div id="summary" class="muted">正在加载...</div>
      <div id="list" class="list"></div>
    </div>
  </div>
  <script>
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, function (ch) {
        switch (ch) {
          case '&': return '&';
          case '<': return '<';
          case '>': return '>';
          case '"': return '"';
          case "'": return String.fromCharCode(39);
          default: return ch;
        }
      });
    }

    async function loadFollows() {
      const resp = await fetch('/api/dashboard/follows');
      const data = await resp.json();
      const items = data.items || [];
      document.getElementById('summary').textContent = `共 ${items.length} 位作者`;
      const list = document.getElementById('list');
      if (!items.length) {
        list.innerHTML = '<div class="muted">暂无数据，先执行一次手工同步后再查看。</div>';
        return;
      }
      list.innerHTML = items.map((item) => {
        const avatar = item.avatar_url
          ? `<img class="avatar" src="${escapeHtml(item.avatar_url)}" alt="avatar">`
          : '<div class="avatar"></div>';
        const account = item.account ? `@${escapeHtml(item.account)}` : `ID ${escapeHtml(item.user_id)}`;
        return `
          <div class="item">
            ${avatar}
            <div>
              <div class="name">${escapeHtml(item.name || '未命名用户')}</div>
              <div class="sub">${account}</div>
              <div class="sub">最近更新：${escapeHtml(item.updated_at || '-')}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    loadFollows().catch(function () {
      document.getElementById('summary').textContent = '加载失败';
    });
  </script>
</body>
</html>
