{% extends "base.html" %}

{% block title %}待确认删除 - Pixiv 小说同步器{% endblock %}

{% block content %}
<div class="space-y-6 max-w-6xl mx-auto">

  <!-- Header -->
  <div>
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-gray-100 tracking-tight mb-2">待确认删除</h1>
    <p class="text-sm sm:text-base text-gray-500 dark:text-gray-400">检测到以下内容已从您的收藏/追更列表中移除，但 Pixiv 上仍存在。请确认是否删除本地归档。</p>
  </div>

  <!-- Main Card -->
  <section class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700/50 p-5 sm:p-6">

    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
      <!-- Tabs -->
      <div class="flex flex-wrap items-center gap-2 p-1 bg-gray-100 dark:bg-gray-900 rounded-lg w-full sm:w-auto" id="tabs">
        <button class="tab-btn active px-4 py-1.5 text-sm font-semibold rounded-md transition-all bg-white dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm ring-1 ring-gray-200 dark:ring-gray-700" data-type="">全部</button>
        <button class="tab-btn px-4 py-1.5 text-sm font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" data-type="novel">收藏小说</button>
        <button class="tab-btn px-4 py-1.5 text-sm font-semibold rounded-md transition-all text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" data-type="series">追更系列</button>
      </div>

      <!-- Actions & Summary -->
      <div class="flex items-center gap-3 w-full sm:w-auto self-end sm:self-auto">
        <button id="detectBtn" onclick="triggerDetection()" class="flex-1 sm:flex-none px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold rounded-lg shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500/50 disabled:opacity-50 flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <span id="detectBtnText">开始检测</span>
        </button>
        <div class="text-right">
          <div id="summary" class="text-xs font-bold text-gray-900 dark:text-gray-100">加载中...</div>
          <div id="pageInfo" class="text-xs text-gray-500 dark:text-gray-400"></div>
        </div>
      </div>
    </div>

    <!-- List Grid -->
    <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Skeleton Loading -->
      <div class="animate-pulse bg-gray-50 dark:bg-gray-900/50 rounded-xl p-4 flex gap-4 border border-gray-100 dark:border-gray-800">
        <div class="w-20 h-28 bg-gray-200 dark:bg-gray-700 rounded-lg flex-shrink-0"></div>
        <div class="flex-1 space-y-2 py-1">
          <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
          <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
          <div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-full mt-4"></div>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <div class="flex items-center justify-center gap-4 mt-8 pt-6 border-t border-gray-100 dark:border-gray-700/50">
      <button id="prevBtn" class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-500/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm">上一页</button>
      <span id="pagerText" class="text-sm font-mono font-medium text-gray-500 dark:text-gray-400"></span>
      <button id="nextBtn" class="px-4 py-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 rounded-lg text-sm font-semibold hover:bg-gray-50 dark:hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-500/20 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm">下一页</button>
    </div>

  </section>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  let currentPage = 1;
  let totalPages = 1;
  let currentType = '';

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"]/g, function (ch) {
      if (ch === '&') return '&amp;';
      if (ch === '<') return '&lt;';
      if (ch === '>') return '&gt;';
      if (ch === '"') return '&quot;';
      return ch;
    });
  }

  function getPixivUrl(item) {
    if (item.item_type === 'novel') {
      return 'https://www.pixiv.net/novel/show.php?id=' + item.item_id;
    }
    return 'https://www.pixiv.net/novel/series/' + item.item_id;
  }

  function updateGlobalBadge(count) {
    const badge = document.getElementById("globalPendingBadge");
    if(badge) {
      if (count > 0) {
        badge.textContent = count > 99 ? '99+' : count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }
  }

  async function loadPending(page, type) {
    let url = '/api/dashboard/pending-deletions?page=' + page;
    if (type) url += '&item_type=' + encodeURIComponent(type);
    const list = document.getElementById('list');

    try {
      const resp = await fetch(url);
      const data = await resp.json();
      const items = data.items || [];
      currentPage = data.page || 1;
      totalPages = data.total_pages || 1;
      currentType = type || '';

      const totalCount = data.total || 0;
      document.getElementById('summary').innerHTML = `共 <span class="text-brand-600 dark:text-brand-400 font-black">${totalCount}</span> 条待确认`;
      document.getElementById('pageInfo').textContent = '每页 ' + (data.page_size || 20) + ' 条';
      document.getElementById('pagerText').textContent = `${currentPage} / ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;

      // Update global badge
      updateGlobalBadge(totalCount);

      setActiveTab(currentType);

      if (!items.length) {
        list.className = "flex justify-center py-16";
        list.innerHTML = `
          <div class="text-center text-gray-400 dark:text-gray-500">
            <svg class="mx-auto h-12 w-12 mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
            <p class="font-medium">没有待确认的删除记录</p>
          </div>`;
        return;
      }

      list.className = "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4";
      list.innerHTML = items.map(function (item) {
        const pixivUrl = getPixivUrl(item);
        const isBookmark = item.reason === 'unbookmarked';
        const reasonLabel = isBookmark ? '收藏取消' : '追更取消';
        const reasonColorClass = isBookmark ? 'bg-orange-100 text-orange-700 dark:bg-orange-900/30 dark:text-orange-400' : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-400';
        const typeLabel = item.item_type === 'novel' ? '小说' : '系列';

        const coverHtml = item.cover_url
          ? `<img class="w-20 h-28 sm:w-24 sm:h-32 object-cover rounded-lg shadow-sm bg-gray-100 dark:bg-gray-800" src="/proxy/image?url=${encodeURIComponent(item.cover_url)}" alt="cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
          : '';
        const fallbackCover = `<div class="w-20 h-28 sm:w-24 sm:h-32 rounded-lg bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 flex items-center justify-center text-gray-400 dark:text-gray-500 font-bold text-xs p-2 text-center" style="display:${item.cover_url ? 'none' : 'flex'};">${escapeHtml((item.title || '').slice(0, 4))}</div>`;

        return `
          <article class="bg-gray-50 dark:bg-gray-900/40 border border-gray-100 dark:border-gray-800 rounded-xl p-4 flex gap-4 transition-colors hover:bg-white dark:hover:bg-gray-800 hover:shadow-sm">
            <div class="flex-shrink-0">${coverHtml}${fallbackCover}</div>
            <div class="flex flex-col min-w-0 justify-between py-0.5 w-full">
              <div>
                <a class="text-sm sm:text-base font-bold text-gray-900 dark:text-gray-100 hover:text-brand-600 dark:hover:text-brand-400 transition-colors line-clamp-2 leading-snug mb-1.5" href="${escapeHtml(pixivUrl)}" target="_blank" rel="noopener">${escapeHtml(item.title || '未命名')}</a>
                <div class="flex items-center gap-1.5 flex-wrap mb-1.5">
                  <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold ${reasonColorClass}">${escapeHtml(reasonLabel)}</span>
                  <span class="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-bold bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300">${escapeHtml(typeLabel)}</span>
                </div>
                <div class="text-xs text-gray-500 dark:text-gray-400 truncate">作者: ${escapeHtml(item.author_name || '未知')}</div>
                <div class="text-[10px] text-gray-400 dark:text-gray-500 font-mono mt-1 truncate">检测于 ${escapeHtml(item.detected_at || '-').substring(0, 16)}</div>
              </div>

              <div class="flex gap-2 mt-3 pt-3 border-t border-gray-200 dark:border-gray-700/50">
                <button onclick="confirmDeletion(${item.id})" class="flex-1 px-3 py-1.5 bg-red-100 hover:bg-red-200 text-red-700 dark:bg-red-900/30 dark:text-red-400 dark:hover:bg-red-900/50 text-xs font-bold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-red-500/50">确认移除</button>
                <button onclick="restoreDeletion(${item.id})" class="flex-1 px-3 py-1.5 bg-green-100 hover:bg-green-200 text-green-700 dark:bg-green-900/30 dark:text-green-400 dark:hover:bg-green-900/50 text-xs font-bold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-green-500/50">忽略恢复</button>
              </div>
            </div>
          </article>
        `;
      }).join('');
    } catch (err) {
      document.getElementById('summary').textContent = '加载失败';
    }
  }

  function setActiveTab(type) {
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      if ((btn.dataset.type || '') === type) {
        btn.classList.add('active', 'bg-white', 'dark:bg-gray-800', 'text-gray-900', 'dark:text-white', 'shadow-sm', 'ring-1', 'ring-gray-200', 'dark:ring-gray-700');
        btn.classList.remove('text-gray-500', 'dark:text-gray-400', 'hover:text-gray-700', 'dark:hover:text-gray-200');
      } else {
        btn.classList.remove('active', 'bg-white', 'dark:bg-gray-800', 'text-gray-900', 'dark:text-white', 'shadow-sm', 'ring-1', 'ring-gray-200', 'dark:ring-gray-700');
        btn.classList.add('text-gray-500', 'dark:text-gray-400', 'hover:text-gray-700', 'dark:hover:text-gray-200');
      }
    });
  }

  async function confirmDeletion(id) {
    if (!confirm('确认删除？此操作不可撤销，并将删除本地文件。')) return;
    try {
      const resp = await fetch('/api/dashboard/pending-deletions/' + id + '/confirm', { method: 'POST' });
      if (resp.ok) {
        loadPending(currentPage, currentType);
      } else {
        const data = await resp.json();
        alert(data.error || '操作失败');
      }
    } catch (e) { alert('网络错误'); }
  }

  async function restoreDeletion(id) {
    try {
      const resp = await fetch('/api/dashboard/pending-deletions/' + id + '/restore', { method: 'POST' });
      if (resp.ok) {
        loadPending(currentPage, currentType);
      } else {
        const data = await resp.json();
        alert(data.error || '操作失败');
      }
    } catch (e) { alert('网络错误'); }
  }

  async function triggerDetection() {
    var btn = document.getElementById('detectBtn');
    var btnText = document.getElementById('detectBtnText');
    btn.disabled = true;
    btnText.textContent = '检测中...';
    btn.classList.add('animate-pulse');

    try {
      const resp = await fetch('/api/dashboard/pending-deletions/detect', { method: 'POST' });
      const data = await resp.json();
      if (resp.ok) {
        pollDetectionStatus(data.job ? data.job.job_id : null);
      } else {
        alert(data.error || '启动检测失败');
        resetDetectBtn();
      }
    } catch (e) {
      alert('请求失败');
      resetDetectBtn();
    }
  }

  function resetDetectBtn() {
    var btn = document.getElementById('detectBtn');
    var btnText = document.getElementById('detectBtnText');
    btn.disabled = false;
    btnText.textContent = '开始检测';
    btn.classList.remove('animate-pulse');
  }

  async function pollDetectionStatus(jobId) {
    if (!jobId) {
      resetDetectBtn();
      loadPending(1, currentType);
      return;
    }
    var poll = setInterval(async function () {
      try {
        const resp = await fetch('/api/dashboard/sync/status?job_id=' + jobId);
        const data = await resp.json();
        var job = data.job;
        if (!job || job.status === 'succeeded' || job.status === 'failed') {
          clearInterval(poll);
          resetDetectBtn();
          loadPending(1, currentType);
        }
      } catch (e) {
        clearInterval(poll);
        resetDetectBtn();
      }
    }, 3000);
  }

  document.getElementById('tabs').addEventListener('click', function (event) {
    var btn = event.target.closest('.tab-btn');
    if (!btn) return;
    loadPending(1, btn.dataset.type || '');
  });

  document.getElementById('prevBtn').addEventListener('click', function () {
    if (currentPage > 1) loadPending(currentPage - 1, currentType);
  });

  document.getElementById('nextBtn').addEventListener('click', function () {
    if (currentPage < totalPages) loadPending(currentPage + 1, currentType);
  });

  loadPending(1, '');
</script>
{% endblock %}
