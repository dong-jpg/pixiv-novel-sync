<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Pixiv 小说同步器{% endblock %}</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Config -->
  <script src="/static/tailwind_config.js"></script>

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    /* 避免 Vue 渲染闪烁 */
    [v-cloak] { display: none !important; }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <script>
    // 由于之前 Tailwind config 是直接写在 base.html 中的，现在我们为了复用，
    // 将它的逻辑提取出来了，但是在开发阶段，我们需要确保 config 正确加载。
    // 如果 /static/tailwind_config.js 没有被 Flask serve，我们仍然在这里放置一份 fallback。
    if (!window.tailwind || !window.tailwind.config) {
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f2f9ff', 100: '#e6f3ff', 200: '#bfdfff', 300: '#99cbff',
                400: '#4da6ff', 500: '#0096fa', 600: '#0087e1', 700: '#0070bb',
                800: '#005a96', 900: '#00497b', 950: '#002f4d',
              },
              pixiv: {
                bg: '#f5f6f8', text: '#333333', gray: '#999999'
              }
            },
            fontFamily: {
              sans: ['"Helvetica Neue"', 'Helvetica', '"PingFang SC"', '"Hiragino Sans GB"', '"Microsoft YaHei"', '微软雅黑', 'Arial', 'sans-serif'],
            }
          }
        }
      };
    }
  </script>

  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col antialiased text-pixiv-text bg-pixiv-bg">

  <!-- Vue 挂载点 -->
  <div id="app" class="flex-grow flex flex-col" v-cloak>

    <!-- Navbar 组件占位 -->
    <app-navbar current-path="{[ request.path ]}"></app-navbar>

    <!-- Main Content -->
    <main class="flex-grow w-full max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
      {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-6 text-center text-sm text-pixiv-gray bg-white border-t border-gray-200">
      <p>Pixiv Novel Sync Dashboard</p>
    </footer>

  </div>

  <!-- 引入全局共享的 Vue 组件模板 -->
  {% include 'vue_components.html' ignore missing %}

  <script>
    // 全局的基础 Vue 实例初始化工具
    // 为了支持各个页面不同的逻辑，我们在 base 提供一个基座方法
    window.initVueApp = function(setupFunc) {
      const { createApp } = Vue;
      const app = createApp(setupFunc);

      // 注册全局组件 (在 vue_components.html 中定义)
      if (typeof registerGlobalComponents === 'function') {
        registerGlobalComponents(app);
      }

      app.mount('#app');
      return app;
    };
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
