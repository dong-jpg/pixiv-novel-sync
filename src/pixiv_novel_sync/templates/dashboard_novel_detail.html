{% extends "base.html" %}

{% block title %}小说详情 - Pixiv 小说同步器{% endblock %}

{% block extra_head %}
<style>
  /* Override base layout for immersive reading */
  body { background: #fff !important; }
  .app-sidebar { display: none !important; }
  .app-main { margin-left: 0 !important; }
  .mobile-bottom-bar { display: none !important; }

  /* ========== Reading Progress Bar ========== */
  .reading-progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    z-index: 9999;
    background: transparent;
    pointer-events: none;
  }
  .reading-progress-bar .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #0096fa 0%, #00c8ff 50%, #0096fa 100%);
    transition: width 0.15s ease-out;
    border-radius: 0 2px 2px 0;
  }

  /* ========== Sticky Top Nav ========== */
  .reader-top-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    transition: box-shadow 0.2s;
  }
  .reader-top-nav.scrolled {
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .reader-top-nav-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .nav-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #666;
    text-decoration: none;
    transition: color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-back:hover { color: #0096fa; }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-progress {
    font-size: 12px;
    color: #999;
    font-variant-numeric: tabular-nums;
  }
  .nav-font-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid #e5e5e5;
    background: #fff;
    color: #666;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    user-select: none;
  }
  .nav-font-btn:hover {
    border-color: #0096fa;
    color: #0096fa;
    background: #f0f8ff;
  }

  /* ========== Novel Header ========== */
  .novel-header {
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 20px 1.5rem;
    text-align: center;
  }
  .novel-header .novel-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.5;
    letter-spacing: 0.02em;
    margin-bottom: 0.75rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .novel-header .novel-author {
    margin-bottom: 0.5rem;
  }
  .novel-header .novel-author a {
    color: #0096fa;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 500;
  }
  .novel-header .novel-author a:hover { text-decoration: underline; }
  .novel-header .novel-stats {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-size: 0.8125rem;
    color: #999;
    margin-top: 0.5rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .novel-header .novel-stats .stat-item {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .novel-header .novel-stats .stat-item svg {
    width: 14px;
    height: 14px;
    opacity: 0.5;
  }
  .novel-header .series-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 0.75rem;
    padding: 4px 12px;
    background: #f0f8ff;
    color: #0096fa;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.15s;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .novel-header .series-badge:hover { background: #e0f0ff; }
  .novel-header .series-badge svg { width: 14px; height: 14px; }
  .novel-header-divider {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 20px;
  }
  .novel-header-divider hr {
    border: none;
    height: 1px;
    background: #f0f0f0;
  }

  /* ========== Reader Body ========== */
  .reader-body-wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 1.5rem 20px 6rem;
  }
  .reader-body {
    font-family: "BIZ UDMincho", "Hiragino Mincho ProN", "Yu Mincho", "Noto Serif JP", "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
    font-size: 1.0625rem;
    line-height: 2;
    letter-spacing: 0.04em;
    color: #444;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .reader-body p {
    text-indent: 2em;
    margin-bottom: 0.25em;
  }
  .reader-body p.empty-line {
    height: 1.5em;
    text-indent: 0;
  }

  /* ========== Fixed Bottom Chapter Nav ========== */
  .chapter-bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .chapter-bottom-inner {
    max-width: 800px;
    margin: 0 auto;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .chapter-nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: #0096fa;
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 8px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chapter-nav-btn:hover {
    background: #f0f8ff;
  }
  .chapter-nav-btn.disabled {
    color: #ccc;
    pointer-events: none;
  }
  .chapter-nav-btn svg { width: 16px; height: 16px; }
  .chapter-info {
    font-size: 12px;
    color: #999;
    text-align: center;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ========== States ========== */
  .reader-loading, .reader-error {
    text-align: center;
    padding: 5rem 1rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .reader-loading { color: #999; font-size: 0.875rem; }
  .reader-error { color: #e74c3c; font-size: 0.9375rem; font-weight: 500; }

  /* ========== Font Size Steps ========== */
  .reader-body.fs-small  { font-size: 0.9375rem; }
  .reader-body.fs-normal { font-size: 1.0625rem; }
  .reader-body.fs-large  { font-size: 1.1875rem; }
  .reader-body.fs-xlarge { font-size: 1.375rem; }

  /* ========== Responsive ========== */
  @media (max-width: 640px) {
    .novel-header { padding: 2rem 16px 1rem; }
    .novel-header .novel-title { font-size: 1.4rem; }
    .reader-body-wrapper { padding: 1rem 16px 5rem; }
    .reader-top-nav-inner { padding: 8px 16px; }
    .chapter-bottom-inner { padding: 8px 12px; }
    .chapter-nav-btn { padding: 6px 10px; font-size: 12px; }
  }
</style>
{% endblock %}

{% block content %}
<!-- Fixed top progress bar -->
<div class="reading-progress-bar">
  <div class="bar-fill" :style="{ width: progressPercent + '%' }"></div>
</div>

<!-- Sticky top nav -->
<div class="reader-top-nav" :class="{ scrolled: isScrolled }">
  <div class="reader-top-nav-inner">
    <a href="/dashboard/novels" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      返回列表
    </a>
    <span class="nav-progress" v-if="!loading && !error">{{ progressPercent }}%</span>
    <button class="nav-font-btn" @click="cycleFontSize" title="切换字号">
      <span style="font-size:11px;">字</span>
    </button>
  </div>
</div>

<!-- Error -->
<div v-if="error" class="reader-error">{{ error }}</div>

<!-- Loading -->
<div v-else-if="loading" class="reader-loading">正在加载正文…</div>

<!-- Reader -->
<template v-else>
  <!-- Novel header -->
  <div class="novel-header">
    <h1 class="novel-title">{{ novel.title || '无标题' }}</h1>
    <div class="novel-author">
      <a v-if="novel.user_id" :href="'/dashboard/users/' + novel.user_id">{{ novel.author_name || '未知' }}</a>
      <span v-else style="color:#666; font-size:0.875rem;">{{ novel.author_name || '未知' }}</span>
    </div>
    <div class="novel-stats">
      <span class="stat-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        {{ formatTextLength(novel.text_length) }}
      </span>
      <span class="stat-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        {{ formatNumber(novel.total_bookmarks) }} 收藏
      </span>
      <span class="stat-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        {{ formatNumber(novel.total_views) }} 浏览
      </span>
      <span class="stat-item" v-if="novel.create_date">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        {{ formatDate(novel.create_date) }}
      </span>
    </div>
    <a v-if="novel.series_id && seriesInfo" :href="'/dashboard/series/' + novel.series_id" class="series-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      {{ seriesInfo.title || '系列' }} ({{ chapterIndex + 1 }}/{{ seriesInfo.total_novels }})
    </a>
  </div>
  <div class="novel-header-divider"><hr></div>

  <!-- Novel body -->
  <div class="reader-body-wrapper">
    <div class="reader-body" :class="'fs-' + fontSize" v-html="formattedContent"></div>
  </div>

  <!-- Fixed bottom chapter nav (series only) -->
  <div class="chapter-bottom-bar" v-if="novel.series_id && seriesInfo">
    <div class="chapter-bottom-inner">
      <a :href="prevNovelId ? ('/dashboard/novels/' + prevNovelId) : null"
         class="chapter-nav-btn" :class="{ disabled: !prevNovelId }">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        上一章
      </a>
      <span class="chapter-info">第 {{ chapterIndex + 1 }} / {{ seriesInfo.total_novels }} 章</span>
      <a :href="nextNovelId ? ('/dashboard/novels/' + nextNovelId) : null"
         class="chapter-nav-btn" :class="{ disabled: !nextNovelId }">
        下一章
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
  </div>
</template>
{% endblock %}

{% block extra_scripts %}
<script>
  initVueApp({
    setup() {
      const { ref, computed, onMounted, onUnmounted, nextTick, watch } = Vue;

      const novelId = Number(location.pathname.split('/').pop() || 0);
      const storageKey = `pixivNovelSync:reading:${novelId}`;

      // State
      const novel = ref(null);
      const loading = ref(true);
      const error = ref(null);
      const progressPercent = ref(0);
      const isScrolled = ref(false);
      const seriesInfo = ref(null);

      // Font size cycling
      const fontSizes = ['small', 'normal', 'large', 'xlarge'];
      const savedFontIdx = (() => {
        try {
          const s = localStorage.getItem('pixivNovelSync:fontSize');
          const idx = fontSizes.indexOf(s);
          return idx >= 0 ? idx : 1;
        } catch { return 1; }
      })();
      const fontSizeIdx = ref(savedFontIdx);
      const fontSize = computed(() => fontSizes[fontSizeIdx.value]);
      const cycleFontSize = () => {
        fontSizeIdx.value = (fontSizeIdx.value + 1) % fontSizes.length;
        try { localStorage.setItem('pixivNovelSync:fontSize', fontSizes[fontSizeIdx.value]); } catch {}
      };

      let restorePending = true;
      let scrollThrottle = null;

      // Formatters
      const formatNumber = (val) => Number(val || 0).toLocaleString('zh-CN');
      const formatTextLength = (chars) => {
        const val = Number(chars || 0);
        if (!val) return '0 字';
        if (val >= 10000) return (val / 10000).toFixed(1) + ' 万字';
        return formatNumber(val) + ' 字';
      };
      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        try {
          const d = new Date(dateStr);
          return d.getFullYear() + '-' +
            String(d.getMonth() + 1).padStart(2, '0') + '-' +
            String(d.getDate()).padStart(2, '0');
        } catch { return dateStr; }
      };

      const escapeHtml = (unsafe) => {
        return (unsafe || '').replace(/[&<"'>]/g, function (match) {
          const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
          return map[match];
        });
      };

      // Formatted content
      const formattedContent = computed(() => {
        if (!novel.value) return '';
        const text = novel.value.text_raw || novel.value.text_markdown || '';
        // Always escape line-by-line. The body is untrusted Pixiv author content;
        // returning it raw when it happened to contain "<p>" was a stored-XSS sink
        // (this value is rendered via v-html below).
        return text.split('\n').map(line => {
          const t = line.trim();
          return t ? `<p>${escapeHtml(t)}</p>` : `<p class="empty-line"></p>`;
        }).join('\n');
      });

      // Series chapter navigation
      const chapterIndex = computed(() => {
        if (!seriesInfo.value || !seriesInfo.value.novels) return -1;
        return seriesInfo.value.novels.findIndex(n => n.novel_id === novelId);
      });
      const prevNovelId = computed(() => {
        const idx = chapterIndex.value;
        if (idx <= 0 || !seriesInfo.value) return null;
        return seriesInfo.value.novels[idx - 1].novel_id;
      });
      const nextNovelId = computed(() => {
        const idx = chapterIndex.value;
        if (!seriesInfo.value || idx < 0 || idx >= seriesInfo.value.novels.length - 1) return null;
        return seriesInfo.value.novels[idx + 1].novel_id;
      });

      // Progress tracking
      const readSavedProgress = () => {
        try { return JSON.parse(localStorage.getItem(storageKey) || 'null'); } catch { return null; }
      };

      const getReadingProgress = () => {
        const doc = document.documentElement;
        const maxScroll = Math.max(1, doc.scrollHeight - window.innerHeight);
        return {
          scrollY: Math.max(0, Math.round(window.scrollY)),
          progress: Math.min(1, Math.max(0, window.scrollY / maxScroll))
        };
      };

      const saveProgress = () => {
        if (!novel.value) return;
        const current = getReadingProgress();
        progressPercent.value = Math.round(current.progress * 100);
        try {
          localStorage.setItem(storageKey, JSON.stringify({
            novelId,
            seriesId: novel.value.series_id ? Number(novel.value.series_id) : null,
            title: novel.value.title || '',
            scrollY: current.scrollY,
            progress: current.progress,
            updatedAt: Date.now()
          }));
        } catch {}
      };

      const handleScroll = () => {
        isScrolled.value = window.scrollY > 10;
        if (scrollThrottle) return;
        scrollThrottle = setTimeout(() => {
          scrollThrottle = null;
          saveProgress();
        }, 300);
      };

      // Fetch novel detail
      const fetchDetail = async () => {
        loading.value = true;
        error.value = null;
        try {
          const res = await fetch(`/api/dashboard/novels/${encodeURIComponent(novelId)}`);
          const data = await res.json();
          if (res.ok) {
            novel.value = data;
            if (data.title) document.title = `${data.title} - Pixiv 小说同步器`;

            // Fetch series info for chapter nav
            if (data.series_id) {
              fetchSeriesInfo(data.series_id);
            }

            // Restore scroll after render
            nextTick(() => {
              const saved = readSavedProgress();
              if (restorePending && saved && saved.scrollY > 0 && !window.location.hash) {
                window.scrollTo({ top: Math.min(saved.scrollY, document.documentElement.scrollHeight), behavior: 'auto' });
              }
              saveProgress();
              restorePending = false;
            });
          } else {
            error.value = data.error || '未找到小说';
          }
        } catch (e) {
          error.value = '加载失败';
        } finally {
          loading.value = false;
        }
      };

      // Fetch series info for prev/next navigation
      const fetchSeriesInfo = async (seriesId) => {
        try {
          const res = await fetch(`/api/dashboard/series/${encodeURIComponent(seriesId)}`);
          if (res.ok) {
            seriesInfo.value = await res.json();
          }
        } catch {}
      };

      onMounted(() => {
        fetchDetail();
        window.addEventListener('scroll', handleScroll, { passive: true });
        window.addEventListener('beforeunload', saveProgress);
      });

      onUnmounted(() => {
        window.removeEventListener('scroll', handleScroll);
        window.removeEventListener('beforeunload', saveProgress);
        clearTimeout(scrollThrottle);
      });

      return {
        novel, loading, error, progressPercent, isScrolled,
        seriesInfo, chapterIndex, prevNovelId, nextNovelId,
        formattedContent, formatNumber, formatTextLength, formatDate,
        fontSize, cycleFontSize
      };
    }
  });
</script>
{% endblock %}
