{% extends "base.html" %}

{% block title %}小说详情 - Pixiv 小说同步器{% endblock %}

{% block extra_head %}
<style>
  /* 覆盖 base.html 的渐变背景，使用 Pixiv 纯色背景 */
  body { background-color: #fffffc !important; color: #444; }
  body > .fixed.-z-10 { display: none !important; }

  /* ========== Pixiv Novel Reader Style ========== */
  .novel-reader-content {
    max-width: 680px;
    width: 80%;
    margin: 0 auto;
    padding: 0 0 6rem;
    font-family: "BIZ UDMincho", "Hiragino Mincho ProN", "Hiragino Mincho Pro", "Yu Mincho", YuMincho, "Noto Serif JP", "Noto Serif SC", "Source Han Serif SC", "宋体", SimSun, serif;
    font-size: 1.0625rem;
    line-height: 2;
    letter-spacing: 0.06em;
    color: #444;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  .novel-reader-content .novel-title {
    font-size: 1.75rem;
    font-weight: 600;
    text-align: center;
    color: #333;
    padding: 2.5rem 0 0.5rem;
    line-height: 1.5;
    letter-spacing: 0.04em;
  }

  .novel-reader-content .novel-author {
    text-align: center;
    font-size: 0.875rem;
    color: #999;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid #e8e8e8;
  }
  .novel-reader-content .novel-author a {
    color: #0096fa;
    text-decoration: none;
  }
  .novel-reader-content .novel-author a:hover {
    text-decoration: underline;
  }

  .novel-reader-content .reader-body p {
    margin: 0;
    text-indent: 1em;
  }
  .novel-reader-content .reader-body p:empty {
    height: 1.8em;
  }

  /* 信息卡在 Pixiv 背景下的样式 */
  .novel-info-card {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 1.5rem 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .novel-info-card .info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.75rem;
  }
  @media (min-width: 1024px) {
    .novel-info-card .info-grid { grid-template-columns: repeat(4, 1fr); }
  }
  .novel-info-card .info-item {
    background: #f8f8f6;
    border-radius: 8px;
    padding: 0.75rem;
  }
  .novel-info-card .info-item .label {
    font-size: 11px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .novel-info-card .info-item .value {
    font-size: 14px;
    font-weight: 600;
    color: #444;
  }
  .novel-info-card .info-item .value a {
    color: #0096fa;
    text-decoration: none;
  }
  .novel-info-card .info-item .value a:hover {
    text-decoration: underline;
  }

  .cover-gradient {
    background: linear-gradient(135deg, #e8ecf4 0%, #d4dbe8 100%);
  }

  /* 返回链接 */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #999;
    text-decoration: none;
    transition: color 0.15s;
  }
  .back-link:hover { color: #0096fa; }

  /* 徽章 */
  .novel-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    line-height: 1.6;
  }
  .badge-blue { background: #e8f0fe; color: #1a73e8; }
  .badge-gray { background: #f0f0f0; color: #666; }
  .badge-green { background: #e6f4ea; color: #137333; }
  .badge-red { background: #fce8e6; color: #c5221f; }
  .badge-yellow { background: #fef7e0; color: #b06000; }

  @media (max-width: 640px) {
    .novel-reader-content {
      width: 92%;
      font-size: 1rem;
    }
    .novel-reader-content .novel-title {
      font-size: 1.35rem;
    }
    .novel-info-card {
      padding: 1rem 1.25rem;
    }
  }
</style>
{% endblock %}

{% block content %}
<div style="max-width:960px;margin:0 auto;padding:0 1rem;">

  <!-- Back Link -->
  <div style="padding:1rem 0;">
    <a class="back-link" href="/dashboard/novels">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      返回小说列表
    </a>
  </div>

  <!-- Novel Info Card -->
  <section id="hero" class="novel-info-card" style="margin-bottom:2rem;">
    <div style="display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;">
      <div style="width:120px;height:168px;background:#f0f0f0;border-radius:8px;flex-shrink:0;animation:pulse 2s infinite;"></div>
      <div style="flex:1;min-width:200px;">
        <div style="height:28px;background:#f0f0f0;border-radius:6px;width:60%;margin-bottom:12px;animation:pulse 2s infinite;"></div>
        <div style="height:16px;background:#f0f0f0;border-radius:4px;width:40%;animation:pulse 2s infinite;"></div>
      </div>
    </div>
  </section>

  <!-- Pixiv-style Reader -->
  <div id="content" class="novel-reader-content">
    <div style="text-align:center;padding:5rem 0;color:#999;">正在加载正文...</div>
  </div>

</div>

<!-- Bottom Progress Bar -->
<div class="fixed bottom-0 left-0 right-0 h-1 z-50" style="background:#eee;">
  <div id="progressFill" class="h-full w-0 transition-all duration-150 ease-linear" style="background:#0096fa;"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const pathParts = window.location.pathname.split('/');
  const novelId = Number(pathParts[pathParts.length - 1] || 0);
  const storageKey = `pixivNovelSync:reading:${novelId}`;
  let restorePending = true;
  let scrollThrottle = null;

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"]/g, function (ch) {
      if (ch === '&') return '&amp;'; if (ch === '<') return '&lt;';
      if (ch === '>') return '&gt;'; if (ch === '"') return '&quot;'; return ch;
    });
  }
  function formatNumber(value) { return Number(value || 0).toLocaleString('zh-CN'); }
  function formatTextLength(chars) {
    const v = Number(chars || 0);
    if (!v) return '0 字';
    return v >= 10000 ? (v / 10000).toFixed(1) + ' 万字' : formatNumber(v) + ' 字';
  }

  function badgeClass(type) {
    return { brand:'badge-blue', success:'badge-green', danger:'badge-red', warning:'badge-yellow', default:'badge-gray' }[type] || 'badge-gray';
  }
  function createBadge(text, type) {
    if (!text) return '';
    return `<span class="novel-badge ${badgeClass(type)}">${escapeHtml(text)}</span>`;
  }
  function restrictLabel(v) { return v === 'public' ? '公开' : v === 'private' ? '私密' : v || '未知'; }
  function kindLabel(v) { return v === 'series' ? '系列' : v === 'single' ? '单本' : '未知'; }

  function readSavedProgress() {
    try { return JSON.parse(localStorage.getItem(storageKey) || 'null'); } catch (e) { return null; }
  }
  function getReadingProgress() {
    const doc = document.documentElement;
    const maxScroll = Math.max(1, doc.scrollHeight - window.innerHeight);
    return { scrollY: Math.max(0, Math.round(window.scrollY)), progress: Math.min(1, Math.max(0, window.scrollY / maxScroll)) };
  }
  function updateProgressUi(progress) {
    const fill = document.getElementById('progressFill');
    if (fill) fill.style.width = Math.round((progress || 0) * 100) + '%';
  }
  function saveProgress(data) {
    const current = getReadingProgress();
    updateProgressUi(current.progress);
    try {
      localStorage.setItem(storageKey, JSON.stringify({
        novelId, seriesId: data?.series_id ? Number(data.series_id) : null,
        title: data?.title || '', scrollY: current.scrollY,
        progress: current.progress, updatedAt: Date.now()
      }));
    } catch (e) {}
  }
  function setupProgressTracking(data) {
    const saved = readSavedProgress();
    if (restorePending && saved && saved.scrollY > 0 && !window.location.hash) {
      requestAnimationFrame(() => {
        window.scrollTo({ top: Math.min(saved.scrollY, document.documentElement.scrollHeight), behavior: 'auto' });
        updateProgressUi(getReadingProgress().progress);
      });
    } else { updateProgressUi(getReadingProgress().progress); }
    restorePending = false;
    window.addEventListener('scroll', () => {
      if (scrollThrottle) return;
      scrollThrottle = setTimeout(() => { scrollThrottle = null; saveProgress(data); }, 300);
    }, { passive: true });
    window.addEventListener('beforeunload', () => saveProgress(data));
  }

  function formatContent(text, title, authorName, userId) {
    let header = '';
    if (title) header += `<div class="novel-title">${escapeHtml(title)}</div>`;
    if (authorName) {
      const link = userId
        ? `<a href="/dashboard/users/${encodeURIComponent(userId)}">${escapeHtml(authorName)}</a>`
        : escapeHtml(authorName);
      header += `<div class="novel-author">${link}</div>`;
    }
    let bodyHtml;
    if (text.includes('<p>')) {
      bodyHtml = text;
    } else {
      bodyHtml = text.split('\n').map(line => {
        const t = line.trim();
        return t ? '<p>' + escapeHtml(t) + '</p>' : '<p></p>';
      }).join('\n');
    }
    return header + '<div class="reader-body">' + bodyHtml + '</div>';
  }

  async function loadDetail() {
    const resp = await fetch(`/api/dashboard/novels/${encodeURIComponent(novelId)}`);
    const data = await resp.json();
    if (!resp.ok) {
      document.getElementById('hero').innerHTML = '<div style="text-align:center;padding:2rem;"><h2 style="color:#c00;font-size:1.25rem;">加载失败</h2><p style="color:#999;margin-top:8px;">未找到这本小说</p></div>';
      document.getElementById('content').innerHTML = '<div style="text-align:center;padding:5rem 0;color:#c00;">' + escapeHtml(data.error || '未找到小说') + '</div>';
      return;
    }

    // Hero info card
    const cover = data.cover_url
      ? `<img style="width:120px;height:168px;object-fit:cover;border-radius:8px;flex-shrink:0;" src="/proxy/image?url=${encodeURIComponent(data.cover_url)}" alt="cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
      : '';
    const fallbackCover = `<div class="cover-gradient" style="width:120px;height:168px;border-radius:8px;display:${data.cover_url ? 'none' : 'flex'};align-items:center;justify-content:center;color:#667;font-weight:bold;text-align:center;padding:8px;flex-shrink:0;font-size:14px;">${escapeHtml((data.title || '').slice(0, 8))}</div>`;

    const nsMap = { normal:{l:'正常',t:'success'}, deleted:{l:'已删除',t:'danger'}, restricted:{l:'受限',t:'warning'}, unknown:{l:'未检查',t:'default'} };
    const ns = nsMap[data.status] || nsMap.unknown;
    const author = data.author_name || '未知';
    const authorLink = data.user_id ? `<a href="/dashboard/users/${encodeURIComponent(data.user_id)}">${escapeHtml(author)}</a>` : escapeHtml(author);

    document.getElementById('hero').innerHTML = `
      <div style="display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;">
        ${cover}${fallbackCover}
        <div style="flex:1;min-width:200px;">
          <h1 style="font-size:1.5rem;font-weight:700;color:#333;margin:0 0 8px;line-height:1.4;">${escapeHtml(data.title || '未命名小说')}</h1>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;">
            ${createBadge(kindLabel(data.novel_kind), 'brand')}
            ${createBadge(restrictLabel(data.restrict_value), 'default')}
            ${createBadge(ns.l, ns.t)}
          </div>
          ${data.caption ? `<p style="font-size:13px;color:#666;line-height:1.7;margin:0 0 16px;">${escapeHtml(data.caption)}</p>` : ''}
          <div class="info-grid">
            <div class="info-item"><div class="label">作者</div><div class="value">${authorLink}</div></div>
            <div class="info-item"><div class="label">字数</div><div class="value">${formatTextLength(data.text_length)}</div></div>
            <div class="info-item"><div class="label">收藏 / 浏览</div><div class="value">${formatNumber(data.total_bookmarks)} / ${formatNumber(data.total_views)}</div></div>
            <div class="info-item"><div class="label">发布时间</div><div class="value">${escapeHtml(data.create_date || '-').substring(0, 10)}</div></div>
          </div>
        </div>
      </div>
    `;

    // Reader content
    const rawContent = data.text_raw || data.text_markdown || '';
    document.getElementById('content').innerHTML = formatContent(rawContent, data.title, data.author_name, data.user_id);
    setupProgressTracking(data);
  }

  loadDetail().catch(() => {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:5rem 0;color:#c00;font-weight:bold;">加载失败</div>';
  });
</script>
{% endblock %}
