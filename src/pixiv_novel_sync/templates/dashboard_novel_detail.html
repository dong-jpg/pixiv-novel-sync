<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小说详情 - Pixiv 小说同步器</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --line: #d2d2d7;
      --brand-start: #007aff;
      --brand-end: #5856d6;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--bg-soft); color: var(--text); -webkit-font-smoothing: antialiased; }
    .topbar { background: #fff; border-bottom: 2px solid transparent; background-image: linear-gradient(#fff, #fff), linear-gradient(90deg, var(--brand-start), var(--brand-end)); background-origin: padding-box, border-box; background-clip: padding-box, border-box; }
    .topbar-inner { max-width: 1080px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .brand { font-size: 17px; font-weight: 600; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav { display: flex; gap: 4px; }
    .nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; transition: all 0.2s; position: relative; }
    .nav a:hover { color: var(--text); background: rgba(0,122,255,0.06); }
    .nav a.active { color: var(--brand-start); font-weight: 600; }
    .nav a.active::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); border-radius: 1px; }
    .page { max-width: 1080px; margin: 0 auto; padding: 32px 24px 56px; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--brand-start); text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
    .back-link:hover { text-decoration: underline; }
    .hero { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--card-shadow); padding: 32px; display: grid; grid-template-columns: 180px 1fr; gap: 28px; }
    .cover { width: 180px; height: 250px; border-radius: 14px; object-fit: cover; background: linear-gradient(135deg, var(--brand-start), var(--brand-end)); flex-shrink: 0; }
    .empty-cover { width: 180px; height: 250px; border-radius: 14px; background: var(--line); flex-shrink: 0; }
    .info { display: flex; flex-direction: column; justify-content: center; }
    .title { font-size: 24px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; line-height: 1.3; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px; background: rgba(0,122,255,0.1); color: var(--brand-start); font-size: 12px; font-weight: 600; }
    .meta { color: var(--text-secondary); font-size: 13px; line-height: 1.8; }
    .meta strong { color: var(--text); font-weight: 600; }
    .card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--card-shadow); padding: 28px; margin-top: 20px; }
    .card-title { font-size: 16px; font-weight: 700; margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .content { font-size: 14px; line-height: 1.9; color: var(--text); white-space: pre-wrap; word-break: break-word; font-family: Georgia, "Times New Roman", serif; text-align: left; }
    .content p { margin: 0 0 1em 0; text-align: left; }
    .content br { display: block; content: ""; margin-top: 0.5em; }
    .loading { text-align: center; padding: 48px; color: var(--text-secondary); }
    .error { text-align: center; padding: 48px; color: var(--text-secondary); }
    .btn { border: none; border-radius: 10px; padding: 11px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-danger { background: linear-gradient(90deg, #ff3b30, #ff6b6b); color: #fff; }
    .btn-danger:hover { opacity: 0.9; transform: translateY(-1px); }
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    @media (max-width: 860px) {
      .topbar-inner { flex-direction: column; height: auto; padding: 12px 16px; gap: 8px; }
      .hero { grid-template-columns: 1fr; }
      .cover, .empty-cover { width: 100%; height: 260px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Pixiv 小说同步器</div>
      <nav class="nav">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/follows">关注</a>
        <a class="active" href="/dashboard/novels">小说</a>
        <a href="/dashboard/logs">日志</a>
        <a href="/dashboard/settings">设置</a>
        <a href="/token-login">登录</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <a class="back-link" href="/dashboard/novels">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      返回小说列表
    </a>

    <section id="hero" class="hero">
      <div class="empty-cover"></div>
      <div class="info">
        <h1 class="title">加载中...</h1>
        <div class="badges"></div>
        <div class="meta">请稍候</div>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">正文预览</h2>
      <div id="content" class="loading">正在加载正文...</div>
      <div class="actions">
        <button id="deleteBtn" class="btn btn-danger" onclick="deleteNovel()">删除此小说</button>
      </div>
    </section>
  </main>

  <script>
    const pathParts = window.location.pathname.split('/');
    const novelId = Number(pathParts[pathParts.length - 1] || 0);

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, function (ch) {
        if (ch === '&') return '&';
        if (ch === '<') return '<';
        if (ch === '>') return '>';
        if (ch === '"') return '"';
        return ch;
      });
    }

    function restrictLabel(value) {
      if (value === 'public') return '公开';
      if (value === 'private') return '私密';
      return value || '未知';
    }

    function kindLabel(value) {
      if (value === 'series') return '系列';
      if (value === 'single') return '单本';
      return '未知';
    }

    async function loadDetail() {
      const resp = await fetch(`/api/dashboard/novels/${encodeURIComponent(novelId)}`);
      const data = await resp.json();
      if (!resp.ok) {
        document.getElementById('hero').innerHTML = `
          <div class="info">
            <h1 class="title">加载失败</h1>
            <div class="meta">未找到这本小说</div>
          </div>
        `;
        document.getElementById('content').innerHTML = '<div class="error">' + escapeHtml(data.error || '未找到小说') + '</div>';
        return;
      }
      const cover = data.cover_url
        ? `<img class="cover" src="/proxy/image?url=${encodeURIComponent(data.cover_url)}" alt="cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
        : '';
      const fallbackCover = `<div class="empty-cover" style="display:${data.cover_url ? 'none' : 'flex'};align-items:center;justify-content:center;color:var(--text-secondary);font-size:18px;text-align:center;padding:16px;">${escapeHtml((data.title || '').slice(0, 6))}</div>`;
      const novelStatusMap = {normal: {label: '正常', color: 'var(--success)'}, deleted: {label: '已删除', color: 'var(--danger)'}, restricted: {label: '受限', color: '#ff9500'}, unknown: {label: '未检查', color: 'var(--text-secondary)'}};
      const ns = novelStatusMap[data.status] || novelStatusMap.unknown;
      const statusBadge = `<span class="badge" style="background:${ns.color}20;color:${ns.color};">● ${ns.label}</span>`;
      const badges = [kindLabel(data.novel_kind), restrictLabel(data.restrict_value)].map(function(b) {
        return '<span class="badge">' + escapeHtml(b) + '</span>';
      }).join('') + statusBadge;
      document.getElementById('hero').innerHTML = `
        ${cover}${fallbackCover}
        <div class="info">
          <h1 class="title">${escapeHtml(data.title || '未命名小说')}</h1>
          <div class="badges">${badges}</div>
          <div class="meta">
            <strong>作者：</strong>${escapeHtml(data.author_name || '未知')} ${data.author_account ? `(@${escapeHtml(data.author_account)})` : ''}<br>
            <strong>收藏：</strong>${escapeHtml(data.total_bookmarks || 0)} &nbsp; <strong>浏览：</strong>${escapeHtml(data.total_views || 0)}<br>
            <strong>字数：</strong>${escapeHtml(data.text_length || 0)}<br>
            <strong>发布时间：</strong>${escapeHtml(data.create_date || '-')}<br>
            <strong>最近更新：</strong>${escapeHtml(data.last_seen_at || '-')}
          </div>
        </div>
      `;
      const content = data.text_markdown || data.text_raw || '当前未找到本地正文预览内容。';
      document.getElementById('content').innerHTML = '<div class="content">' + escapeHtml(content) + '</div>';
    }

    loadDetail().catch(function () {
      document.getElementById('content').innerHTML = '<div class="error">加载失败</div>';
    });

    async function deleteNovel() {
      if (!confirm('确定要删除这本小说吗？此操作不可撤销。')) {
        return;
      }
      
      try {
        const resp = await fetch(`/api/dashboard/novels/${encodeURIComponent(novelId)}`, {
          method: 'DELETE',
        });
        const data = await resp.json();
        if (resp.ok) {
          alert('小说已删除');
          window.location.href = '/dashboard/novels';
        } else {
          alert('删除失败: ' + (data.error || '未知错误'));
        }
      } catch (err) {
        alert('删除失败: ' + err.message);
      }
    }
  </script>
</body>
</html>
