<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>同步设置 - Pixiv 小说同步器</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f5f5f7;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --line: #d2d2d7;
      --brand-start: #007aff;
      --brand-end: #5856d6;
      --success: #34c759;
      --danger: #ff3b30;
      --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-lg: 20px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: var(--bg-soft); color: var(--text); -webkit-font-smoothing: antialiased; }
    .topbar { background: #fff; border-bottom: 2px solid transparent; background-image: linear-gradient(#fff, #fff), linear-gradient(90deg, var(--brand-start), var(--brand-end)); background-origin: padding-box, border-box; background-clip: padding-box, border-box; }
    .topbar-inner { max-width: 1080px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .brand { font-size: 17px; font-weight: 600; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .nav { display: flex; gap: 4px; }
    .nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 8px; transition: all 0.2s; position: relative; }
    .nav a:hover { color: var(--text); background: rgba(0,122,255,0.06); }
    .nav a.active { color: var(--brand-start); font-weight: 600; }
    .nav a.active::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 20px; height: 2px; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); border-radius: 1px; }
    .page { max-width: 800px; margin: 0 auto; padding: 32px 24px 56px; }
    .page-title { font-size: 28px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.02em; }
    .page-desc { color: var(--text-secondary); margin: 0 0 24px; font-size: 15px; }
    .card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--card-shadow); padding: 28px 32px; }
    .section { margin-bottom: 28px; }
    .section:last-child { margin-bottom: 0; }
    .section-title { font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 14px; }
    .checks { display: grid; gap: 14px; }
    .check-item { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .check-item input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--brand-start); cursor: pointer; }
    .check-item label { font-size: 14px; cursor: pointer; }
    .fields { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.03em; }
    .field input { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; transition: border-color 0.2s; }
    .field input:focus { outline: none; border-color: var(--brand-start); }
    .btn { border: none; border-radius: 10px; padding: 12px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: linear-gradient(90deg, var(--brand-start), var(--brand-end)); color: #fff; }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .message { margin-top: 16px; font-size: 13px; min-height: 20px; }
    .message.ok { color: var(--success); }
    .message.bad { color: var(--danger); }
    @media (max-width: 720px) {
      .topbar-inner { flex-direction: column; height: auto; padding: 12px 16px; gap: 8px; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Pixiv 小说同步器</div>
      <nav class="nav">
        <a href="/dashboard">首页</a>
        <a href="/dashboard/follows">关注</a>
        <a href="/dashboard/novels">小说</a>
        <a class="active" href="/dashboard/settings">设置</a>
        <a href="/token-login">登录</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <h1 class="page-title">同步设置</h1>
    <p class="page-desc">配置同步参数，建议首次保持自动同步关闭。</p>

    <section class="card">
      <div class="section">
        <div class="section-title">同步内容</div>
        <p style="font-size:13px;color:var(--text-secondary);margin:0 0 14px;">分批同步可降低风控风险，建议每次只开启一项</p>
        <div class="checks">
          <div class="check-item">
            <input type="checkbox" id="syncBookmarks">
            <label for="syncBookmarks">同步收藏小说</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="syncFollowingSeries">
            <label for="syncFollowingSeries">同步关注用户的系列</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="syncFollowingUsers">
            <label for="syncFollowingUsers">同步关注用户列表</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="syncFollowingNovels">
            <label for="syncFollowingNovels">同步关注用户的小说</label>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">同步选项</div>
        <div class="checks">
          <div class="check-item">
            <input type="checkbox" id="enabled">
            <label for="enabled">启用自动同步</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="initialManualOnly">
            <label for="initialManualOnly">首次仅允许手工触发</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="downloadAssets">
            <label for="downloadAssets">下载封面与插图资源</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="writeMarkdown">
            <label for="writeMarkdown">输出 Markdown 文件</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="writeRawText">
            <label for="writeRawText">输出原始文本文件</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="restrictPublic">
            <label for="restrictPublic">同步公开收藏</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="restrictPrivate">
            <label for="restrictPrivate">同步私密收藏</label>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">限速参数</div>
        <div class="fields">
          <div class="field">
            <label>单次最大条数</label>
            <input id="maxItems" type="number" min="1" placeholder="留空表示不限">
          </div>
          <div class="field">
            <label>单次最大页数</label>
            <input id="maxPages" type="number" min="1" placeholder="留空表示不限">
          </div>
          <div class="field">
            <label>每本之间延迟（秒）</label>
            <input id="itemDelay" type="number" min="0" step="0.1" placeholder="0">
          </div>
          <div class="field">
            <label>每页之间延迟（秒）</label>
            <input id="pageDelay" type="number" min="0" step="0.1" placeholder="0">
          </div>
        </div>
      </div>

      <button id="saveBtn" class="btn">保存设置</button>
      <div id="message" class="message"></div>
    </section>
  </main>

  <script>
    function checked(id, value) {
      document.getElementById(id).checked = !!value;
    }

    function valueOf(id, value) {
      document.getElementById(id).value = value ?? '';
    }

    async function loadSettings() {
      const resp = await fetch('/api/dashboard/settings');
      const data = await resp.json();
      checked('syncBookmarks', data.sync_bookmarks);
      checked('syncFollowingSeries', data.sync_following_series);
      checked('syncFollowingUsers', data.sync_following_users);
      checked('syncFollowingNovels', data.sync_following_novels);
      checked('enabled', data.enabled);
      checked('initialManualOnly', data.initial_manual_only);
      checked('downloadAssets', data.download_assets);
      checked('writeMarkdown', data.write_markdown);
      checked('writeRawText', data.write_raw_text);
      checked('restrictPublic', (data.bookmark_restricts || []).includes('public'));
      checked('restrictPrivate', (data.bookmark_restricts || []).includes('private'));
      valueOf('maxItems', data.max_items_per_run);
      valueOf('maxPages', data.max_pages_per_run);
      valueOf('itemDelay', data.delay_seconds_between_items ?? 0);
      valueOf('pageDelay', data.delay_seconds_between_pages ?? 0);
    }

    function buildPayload() {
      const restricts = [];
      if (document.getElementById('restrictPublic').checked) restricts.push('public');
      if (document.getElementById('restrictPrivate').checked) restricts.push('private');
      return {
        sync_bookmarks: document.getElementById('syncBookmarks').checked,
        sync_following_series: document.getElementById('syncFollowingSeries').checked,
        sync_following_users: document.getElementById('syncFollowingUsers').checked,
        sync_following_novels: document.getElementById('syncFollowingNovels').checked,
        enabled: document.getElementById('enabled').checked,
        initial_manual_only: document.getElementById('initialManualOnly').checked,
        download_assets: document.getElementById('downloadAssets').checked,
        write_markdown: document.getElementById('writeMarkdown').checked,
        write_raw_text: document.getElementById('writeRawText').checked,
        bookmark_restricts: restricts,
        max_items_per_run: document.getElementById('maxItems').value.trim(),
        max_pages_per_run: document.getElementById('maxPages').value.trim(),
        delay_seconds_between_items: document.getElementById('itemDelay').value.trim(),
        delay_seconds_between_pages: document.getElementById('pageDelay').value.trim(),
      };
    }

    async function saveSettings() {
      const msg = document.getElementById('message');
      msg.className = 'message';
      msg.textContent = '正在保存...';
      const resp = await fetch('/api/dashboard/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(buildPayload()),
      });
      const data = await resp.json();
      if (!resp.ok) {
        msg.className = 'message bad';
        msg.textContent = data.error || '保存失败';
        return;
      }
      msg.className = 'message ok';
      msg.textContent = '设置已保存';
      await loadSettings();
    }

    document.getElementById('saveBtn').addEventListener('click', saveSettings);
    loadSettings();
  </script>
</body>
</html>
