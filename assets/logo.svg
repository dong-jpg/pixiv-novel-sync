<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- 主渐变：蓝紫粉 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E91E63;stop-opacity:1" />
    </linearGradient>

    <!-- 光晕效果 -->
    <radialGradient id="glowGradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0" />
    </radialGradient>

    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#4A90E2" />
    </marker>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGradient)"/>

  <!-- 外圈同步环 -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#mainGradient)" stroke-width="6" stroke-dasharray="20 8" opacity="0.8">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="10s"
      repeatCount="indefinite"/>
  </circle>

  <!-- 主书本图标 -->
  <g transform="translate(100, 100)">
    <!-- 书本底座 -->
    <rect x="-35" y="-30" width="70" height="60" rx="6" fill="url(#mainGradient)" opacity="0.15"/>

    <!-- 书本主体 -->
    <rect x="-30" y="-25" width="60" height="50" rx="4" fill="white" stroke="url(#mainGradient)" stroke-width="2.5"/>

    <!-- 书页线条 -->
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>
    <line x1="-20" y1="-5" x2="15" y2="-5" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>
    <line x1="-20" y1="5" x2="18" y2="5" stroke="url(#mainGradient)" stroke-width="2" opacity="0.4"/>

    <!-- AI 标识 -->
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="url(#mainGradient)">AI</text>
  </g>

  <!-- 同步箭头（顶部） -->
  <path d="M 100 20 Q 130 25 150 40" fill="none" stroke="#4A90E2" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- 同步箭头（右侧） -->
  <path d="M 180 100 Q 175 130 160 150" fill="none" stroke="#9B59B6" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- 同步箭头（左侧） -->
  <path d="M 20 100 Q 25 70 40 50" fill="none" stroke="#E91E63" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- 三个小圆点代表三大功能 -->
  <circle cx="100" cy="25" r="4" fill="#4A90E2">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="145" r="4" fill="#9B59B6">
    <animate attributeName="r" values="4;6;4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="55" r="4" fill="#E91E63">
    <animate attributeName="r" values="4;6;4" dur="2s" begin="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
