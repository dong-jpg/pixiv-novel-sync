# Nginx 配置 for Pixiv Novel Sync
# 图片缓存 + 反向代理

# 图片缓存区域配置
# levels=1:2  - 两级目录结构
# keys_zone=pixiv_img:10m - 缓存键区域名称和大小（10MB 约可存储 8000 个键）
# max_size=1g - 最大缓存磁盘空间
# inactive=7d - 7天未访问的缓存会被删除
# use_temp_path=off - 直接写入目标目录，避免跨分区拷贝
proxy_cache_path /var/cache/nginx/pixiv_img levels=1:2 keys_zone=pixiv_img:10m max_size=1g inactive=7d use_temp_path=off;

server {
    listen 5010;
    server_name _;

    # 日志
    access_log /var/log/nginx/pixiv-novel-sync.access.log;
    error_log /var/log/nginx/pixiv-novel-sync.error.log;

    # 图片代理路由 - 带缓存
    location /proxy/image {
        proxy_pass http://127.0.0.1:5011;

        # 启用缓存
        proxy_cache pixiv_img;
        proxy_cache_valid 200 30d;      # 200 响应缓存 30 天
        proxy_cache_valid 404 1m;       # 404 缓存 1 分钟（避免缓存错误）
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;            # 并发请求只放行一个去后端
        proxy_cache_lock_timeout 5s;

        # 添加缓存状态头（调试用）
        add_header X-Cache-Status $upstream_cache_status;

        # 不传递 Host 头（避免 Pixiv 拒绝请求）
        proxy_set_header Host "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # 缓存 key（基于请求 URI）
        proxy_cache_key $scheme$proxy_host$uri$is_args$args;
    }

    # 其他所有路由 - 直接转发
    location / {
        proxy_pass http://127.0.0.1:5011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
