# Nginx 配置 for Pixiv Novel Sync
# 图片缓存 + 反向代理

# 图片缓存区域配置
# levels=1:2  - 两级目录结构
# keys_zone=pixiv_img:10m - 缓存键区域名称和大小（10MB 约可存储 8000 个键）
# max_size=2g - 最大缓存磁盘空间
# inactive=365d - 365天未访问才删除（封面头像基本不变）
# use_temp_path=off - 直接写入目标目录，避免跨分区拷贝
proxy_cache_path /var/cache/nginx/pixiv_img levels=1:2 keys_zone=pixiv_img:10m max_size=2g inactive=365d use_temp_path=off;

server {
    listen 80;
    server_name pixiv.dongboapp.com;
    return 301 https://pixiv.dongboapp.com$request_uri;
}

server {
    listen 443 ssl;
    server_name pixiv.dongboapp.com;

    ssl_certificate /etc/ssl/certs/pixiv.dongboapp.com.pem;
    ssl_certificate_key /etc/ssl/private/pixiv.dongboapp.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 日志
    access_log /var/log/nginx/pixiv-novel-sync.access.log;
    error_log /var/log/nginx/pixiv-novel-sync.error.log;

    # 图片代理路由 - 带缓存
    location /proxy/image {
        proxy_pass http://127.0.0.1:5011;

        # 启用缓存
        proxy_cache pixiv_img;
        proxy_cache_valid 200 365d;     # 200 响应缓存 365 天（封面头像基本不变）
        proxy_cache_valid 404 1m;       # 404 缓存 1 分钟（避免缓存错误）
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;            # 并发请求只放行一个去后端
        proxy_cache_lock_timeout 5s;

        # 添加缓存状态头（调试用）
        add_header X-Cache-Status $upstream_cache_status;

        # 不传递 Host 头（避免 Pixiv 拒绝请求）
        proxy_set_header Host "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;

        # 缓存 key（基于请求 URI）
        proxy_cache_key $scheme$proxy_host$uri$is_args$args;
    }

    # AI 流式 SSE 路由 - 长连接 + 关闭缓冲（必须放在 location / 之前）
    # 涵盖：/api/dashboard/ai/*/stream（continue / rewrite / audit / distill / plan / chapter / pipeline / chat 等）
    location ~ ^/api/dashboard/ai/.*/stream$ {
        proxy_pass http://127.0.0.1:5011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键设置
        proxy_http_version 1.1;
        proxy_set_header Connection "";       # 强制空 Connection（不要 keep-alive，让流自然结束）
        proxy_buffering off;                  # 关闭缓冲，实时透传
        proxy_cache off;                      # 关闭缓存
        proxy_request_buffering off;          # 请求也不缓冲
        chunked_transfer_encoding on;
        gzip off;                             # 禁用 gzip 否则会缓冲整个响应

        # 长连接超时（30 分钟，足够最长的 pipeline 跑完）
        proxy_connect_timeout 30s;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # 其他所有路由 - 直接转发
    location / {
        proxy_pass http://127.0.0.1:5011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置（普通 API 上调到 5 分钟，覆盖部分非流式 AI 调用如档案保存等）
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 健康检查端点
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
